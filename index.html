<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MercadoHub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23f0a500'/><text x='16' y='23' font-size='18' font-weight='800' text-anchor='middle' fill='%23000' font-family='sans-serif'>M</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#080c10; --bg1:#0d1219; --bg2:#111820; --bg3:#162030;
      --border:#1c2d40; --border2:#243550;
      --text:#c4d8ec; --text2:#5a7a9a; --text3:#334455;
      --accent:#f0a500; --accent2:#ffcc44;
      --green:#22c55e; --red:#ef4444; --blue:#3b9eff;
      --teal:#14b8a6; --purple:#8b5cf6;
    }
    html,body { min-height:100%; background:var(--bg); }
    body { font-family:'Syne',sans-serif; color:var(--text); }
    .mono { font-family:'IBM Plex Mono',monospace; }
    .header { background:var(--bg1); border-bottom:1px solid var(--border); padding:16px 24px 0; position:sticky; top:0; z-index:100; }
    .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .logo { display:flex; align-items:center; gap:10px; }
    .logo-mark { width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,var(--accent),#e08800); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; color:#000; }
    .logo-name { font-size:18px; font-weight:800; letter-spacing:-.5px; color:#e8f4ff; }
    .logo-name span { color:var(--accent); }
    .header-meta { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--text3); }
    .refresh-btn { background:var(--bg2); border:1px solid var(--border2); color:var(--text2); padding:6px 14px; border-radius:6px; font-size:12px; font-family:'Syne',sans-serif; cursor:pointer; transition:all .15s; }
    .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }
    .tabs { display:flex; gap:2px; overflow-x:auto; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab { padding:9px 16px 11px; font-size:12px; font-weight:600; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all .15s; user-select:none; }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .fav-tab.active { color:var(--accent2) !important; border-bottom-color:var(--accent2) !important; }
    .page { padding:20px 24px; }
    .section-label { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text3); margin-bottom:12px; }
    .overview-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
    @media(max-width:900px){.overview-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:500px){.overview-grid{grid-template-columns:1fr 1fr}}
    .summary-card { background:var(--bg1); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
    .sc-label { font-size:10px; color:var(--text3); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; font-family:'IBM Plex Mono',monospace; }
    .sc-val { font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; color:#e8f4ff; }
    .sc-change { font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; margin-top:4px; }
    .pos { color:var(--green); } .neg { color:var(--red); }
    .table-wrap { background:var(--bg1); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:16px; }
    .table-header { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .table-title { font-size:13px; font-weight:700; color:var(--text); }
    .badge { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; padding:2px 7px; border-radius:4px; margin-left:8px; }
    .badge-blue   { background:rgba(59,158,255,.1);  color:var(--blue);   border:1px solid rgba(59,158,255,.2); }
    .badge-amber  { background:rgba(240,165,0,.1);   color:var(--accent); border:1px solid rgba(240,165,0,.2); }
    .badge-teal   { background:rgba(20,184,166,.1);  color:var(--teal);   border:1px solid rgba(20,184,166,.2); }
    .badge-purple { background:rgba(139,92,246,.1);  color:var(--purple); border:1px solid rgba(139,92,246,.2); }
    table { width:100%; border-collapse:collapse; }
    thead th { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--text3); padding:9px 14px; text-align:right; border-bottom:1px solid var(--border); font-weight:500; white-space:nowrap; }
    thead th:first-child { text-align:left; }
    tbody tr { cursor:pointer; transition:background .1s; }
    tbody tr:hover { background:var(--bg2); }
    tbody tr.active-row { background:rgba(240,165,0,.06); border-left:2px solid var(--accent); }
    tbody td { font-family:'IBM Plex Mono',monospace; font-size:12px; padding:10px 14px; text-align:right; border-bottom:1px solid rgba(28,45,64,.5); color:var(--text2); }
    tbody td:first-child { text-align:left; }
    tbody tr:last-child td { border-bottom:none; }
    .t-name { font-size:13px; font-weight:700; color:#e8f4ff; }
    .t-sub  { font-size:10px; color:var(--text3); margin-top:1px; }
    .fav-btn { background:none; border:none; cursor:pointer; color:var(--text3); font-size:15px; padding:2px 5px; transition:color .15s; }
    .fav-btn:hover,.fav-btn.on { color:var(--accent2); }
    .chg { font-weight:700; font-size:13px; }
    .center { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; gap:10px; }
    .spinner { width:22px; height:22px; border:2px solid var(--bg3); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin{to{transform:rotate(360deg)}}
    .err-box { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); color:#ff8080; padding:14px 18px; border-radius:8px; font-size:12px; font-family:'IBM Plex Mono',monospace; margin-bottom:12px; }
    .hint { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text3); text-align:center; padding:14px; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media(max-width:700px){.two-col{grid-template-columns:1fr}}
    .mini-row { display:flex; align-items:center; justify-content:space-between; padding:9px 16px; border-bottom:1px solid rgba(28,45,64,.4); }
    .mini-row:last-child { border-bottom:none; }
    .detail-panel { background:var(--bg1); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-top:16px; }
    .detail-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .detail-ticker { font-size:22px; font-weight:800; color:#f0f8ff; }
    .detail-name   { font-size:11px; color:var(--text3); margin-top:2px; }
    .detail-price  { font-family:'IBM Plex Mono',monospace; font-size:26px; font-weight:600; color:#f0f8ff; }
    .detail-body   { padding:20px; display:flex; flex-direction:column; gap:22px; }
    .sub-title { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text3); margin-bottom:12px; }
    .hist-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
    @media(max-width:600px){.hist-grid{grid-template-columns:repeat(2,1fr)}}
    .hist-card { background:var(--bg2); border:1px solid var(--border); border-radius:7px; padding:11px 12px; }
    .hist-period { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--text3); margin-bottom:5px; text-transform:uppercase; letter-spacing:1px; }
    .hist-price  { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text2); margin-bottom:3px; }
    .hist-pct    { font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:700; }
    .days-table  { width:100%; border-collapse:collapse; }
    .days-table th { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--text3); text-align:right; padding:7px 12px; border-bottom:1px solid var(--border); font-weight:500; }
    .days-table th:first-child { text-align:left; }
    .days-table td { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text2); text-align:right; padding:9px 12px; border-bottom:1px solid rgba(28,45,64,.4); }
    .days-table td:first-child { text-align:left; color:var(--text3); }
    .days-table tr:last-child td { border-bottom:none; }
    .close-btn { background:none; border:1px solid var(--border); color:var(--text3); border-radius:5px; padding:3px 10px; cursor:pointer; font-size:11px; font-family:'IBM Plex Mono',monospace; }
    .fav-empty { display:flex; flex-direction:column; align-items:center; gap:12px; padding:60px 20px; }
    .fav-empty-icon { font-size:40px; opacity:.2; }
    .fav-empty-text { font-size:13px; color:var(--text3); text-align:center; font-family:'IBM Plex Mono',monospace; }
  </style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#334455;font-family:IBM Plex Mono,monospace;font-size:13px;">carregando...</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.1/Recharts.min.js"></script>
<script>
const { useState, useEffect, useCallback, useRef } = React;
const { createRoot } = ReactDOM;
const { createElement: h } = React;
const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

const BASE  = "https://brapi.dev/api";
const TOKEN = "whTDtVbb5qbqH9PuhriuiD";
const q = (url) => `${url}${url.includes("?")?"&":"?"}token=${TOKEN}`;

const CRYPTO_COINS      = "BTC,ETH,BNB,SOL,XRP,ADA,DOGE,AVAX";
const COMMODITY_TICKERS = "GC=F,CL=F,SI=F,NG=F,ZC=F,ZW=F";
const COMMODITY_NAMES   = {"GC=F":"Ouro","CL=F":"Petróleo WTI","SI=F":"Prata","NG=F":"Gás Natural","ZC=F":"Milho","ZW=F":"Trigo"};
const TABS = [
  {id:"overview",label:"Visão Geral",icon:"⬡"},
  {id:"stocks",label:"Ações",icon:"◈"},
  {id:"fiis",label:"FIIs",icon:"◉"},
  {id:"crypto",label:"Criptos",icon:"◆"},
  {id:"commodities",label:"Commodities",icon:"◇"},
  {id:"favorites",label:"Favoritos",icon:"★"},
];

// ── utils ──────────────────────────────────────────────────────
const brl = (v,d=2) => v==null||isNaN(v)?"—":Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:d});
const pct = v => v==null||isNaN(v)?"—":`${v>=0?"+":""}${Number(v).toFixed(2)}%`;
const pctChange = (f,t) => (f&&t&&f!==0)?((t-f)/f)*100:null;
const fmtDate = ts => new Date(ts*1000).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
const fmtDateFull = ts => new Date(ts*1000).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"});
const getPriceAt = (hist,days) => {
  if (!hist?.length) return null;
  const t = Date.now()/1000 - days*86400;
  return hist.reduce((b,e)=>Math.abs(e.date-t)<Math.abs(b.date-t)?e:b,hist[0])?.close??null;
};

// ── Spinner ────────────────────────────────────────────────────
const Spinner = () => h('div',{className:'center'},h('div',{className:'spinner'}),h('span',{style:{fontSize:11,color:'var(--text3)',fontFamily:'IBM Plex Mono'}},'carregando...'));

// ── CustomTooltip ──────────────────────────────────────────────
const CustomTooltip = ({active,payload,label}) => {
  if (!active||!payload?.length) return null;
  return h('div',{style:{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:6,padding:'7px 12px'}},
    h('div',{style:{fontFamily:'IBM Plex Mono',fontSize:9,color:'var(--text3)',marginBottom:2}},label),
    h('div',{style:{fontFamily:'IBM Plex Mono',fontSize:13,fontWeight:600,color:'#f0f8ff'}},brl(payload[0]?.value))
  );
};

// ── DetailPanel ────────────────────────────────────────────────
function DetailPanel({ticker, onClose}) {
  const [data,setData] = useState(null);
  const [loading,setLoading] = useState(true);
  const ref = useRef(null);

  useEffect(()=>{
    setLoading(true); setData(null);
    fetch(q(`${BASE}/quote/${encodeURIComponent(ticker)}?range=1y&interval=1d`))
      .then(r=>r.json()).then(d=>setData(d.results?.[0]??null))
      .catch(()=>setData(null)).finally(()=>setLoading(false));
  },[ticker]);

  useEffect(()=>{ setTimeout(()=>ref.current?.scrollIntoView({behavior:'smooth',block:'start'}),80); },[]);

  if (loading) return h('div',{className:'detail-panel',ref},h(Spinner));
  if (!data) return h('div',{className:'detail-panel',ref},h('div',{className:'hint'},`Dados indisponíveis para ${ticker}`));

  const hist = data.historicalDataPrice??[];
  const cur  = data.regularMarketPrice;
  const last5 = hist.slice(-5);
  const chartData = hist.slice(-252).map(e=>({date:fmtDateFull(e.date),price:e.close}));
  const periods = [{label:'15d',days:15},{label:'30d',days:30},{label:'3m',days:90},{label:'6m',days:180},{label:'1a',days:365}];
  const chgPct = data.regularMarketChangePercent;
  const isPos  = chgPct>=0;

  return h('div',{className:'detail-panel',ref},
    h('div',{className:'detail-head'},
      h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:10}},
          h('div',{className:'detail-ticker'},data.symbol),
          h('button',{className:'close-btn',onClick:onClose},'✕ fechar')
        ),
        h('div',{className:'detail-name'},data.shortName||data.longName||'')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},
        h('div',{className:'detail-price'},brl(cur)),
        h('div',{style:{fontFamily:'IBM Plex Mono',fontSize:12,fontWeight:600,padding:'4px 10px',borderRadius:5,
          background:isPos?'rgba(34,197,94,.1)':'rgba(239,68,68,.1)',
          color:isPos?'var(--green)':'var(--red)',
          border:`1px solid ${isPos?'rgba(34,197,94,.25)':'rgba(239,68,68,.25)'}`}},
          `${isPos?'▲':'▼'} ${Math.abs(chgPct||0).toFixed(2)}%`
        )
      )
    ),
    h('div',{className:'detail-body'},
      chartData.length>0 && h('div',null,
        h('div',{className:'sub-title'},'Gráfico — 12 meses'),
        h('div',{style:{height:180}},
          h(ResponsiveContainer,{width:'100%',height:'100%'},
            h(LineChart,{data:chartData,margin:{top:4,right:4,left:-22,bottom:0}},
              h(CartesianGrid,{stroke:'rgba(28,45,64,.6)',strokeDasharray:'3 3'}),
              h(XAxis,{dataKey:'date',tick:{fontSize:9,fill:'#334455',fontFamily:'IBM Plex Mono'},tickLine:false,interval:Math.floor(chartData.length/6)}),
              h(YAxis,{tick:{fontSize:9,fill:'#334455',fontFamily:'IBM Plex Mono'},tickLine:false,domain:['auto','auto'],tickFormatter:v=>v.toFixed(0)}),
              h(Tooltip,{content:h(CustomTooltip)}),
              h(Line,{type:'monotone',dataKey:'price',stroke:'var(--accent)',strokeWidth:1.5,dot:false,activeDot:{r:4,fill:'var(--accent)'}})
            )
          )
        )
      ),
      last5.length>0 && h('div',null,
        h('div',{className:'sub-title'},'Fechamento — últimos 5 dias'),
        h('table',{className:'days-table'},
          h('thead',null,h('tr',null,
            h('th',null,'Data'),h('th',null,'Abertura'),h('th',null,'Mín'),h('th',null,'Máx'),h('th',null,'Fechamento'),h('th',null,'Var.')
          )),
          h('tbody',null,...last5.map((d,i)=>{
            const prev=last5[i-1]; const v=prev?pctChange(prev.close,d.close):null;
            return h('tr',{key:d.date},
              h('td',null,fmtDate(d.date)),
              h('td',null,brl(d.open)),
              h('td',{style:{color:'var(--red)'}},brl(d.low)),
              h('td',{style:{color:'var(--green)'}},brl(d.high)),
              h('td',{style:{color:'#e8f4ff',fontWeight:600}},brl(d.close)),
              h('td',{style:{color:v==null?'var(--text3)':v>=0?'var(--green)':'var(--red)',fontWeight:600}},v==null?'—':pct(v))
            );
          }))
        )
      ),
      h('div',null,
        h('div',{className:'sub-title'},'Preço histórico vs. hoje'),
        h('div',{className:'hist-grid'},...periods.map(({label,days})=>{
          const past=getPriceAt(hist,days); const ch=pctChange(past,cur);
          return h('div',{className:'hist-card',key:label},
            h('div',{className:'hist-period'},`${label} atrás`),
            h('div',{className:'hist-price'},brl(past)),
            h('div',{className:'hist-pct',style:{color:ch==null?'var(--text3)':ch>=0?'var(--green)':'var(--red)'}},ch==null?'—':pct(ch))
          );
        }))
      )
    )
  );
}

// ── MarketTable ────────────────────────────────────────────────
function MarketTable({title,badge,data,loading,error,favSet,onFav,category,cols,selTicker,onSel}) {
  if (loading) return h('div',{className:'table-wrap'},h(Spinner));
  if (error) return h('div',{className:'err-box'},error);
  return h('div',{className:'table-wrap'},
    h('div',{className:'table-header'},
      h('div',{className:'table-title'},title,h('span',{className:`badge ${badge}`},`${data?.length??0} ativos`))
    ),
    !data?.length ? h('div',{className:'hint'},'Nenhum dado') :
    h('table',null,
      h('thead',null,h('tr',null,
        h('th',{style:{textAlign:'left'}},'Ativo'),
        ...cols.map(c=>h('th',{key:c.key},c.label)),
        h('th',null,'Var. Hoje'),
        h('th',{style:{width:32}},null)
      )),
      h('tbody',null,...data.map(row=>{
        const key=row.stock||row.coin||row.ticker;
        const isActive=selTicker===key;
        const isFav=favSet.has(`${category}:${key}`);
        const chg=row.change??row.regularMarketChangePercent;
        const isPos=(chg??0)>=0;
        return h('tr',{key,className:isActive?'active-row':'',onClick:()=>onSel(key)},
          h('td',null,h('div',null,h('div',{className:'t-name'},key),h('div',{className:'t-sub'},row.name||row.longName||row.shortName||''))),
          ...cols.map(c=>h('td',{key:c.key,style:c.style??{}},c.render?c.render(row):row[c.key]??'—')),
          h('td',{className:`chg ${isPos?'pos':'neg'}`},`${isPos?'▲':'▼'} ${Math.abs(chg??0).toFixed(2)}%`),
          h('td',{onClick:e=>{e.stopPropagation();onFav(`${category}:${key}`,row);}},
            h('button',{className:`fav-btn ${isFav?'on':''}`},'★')
          )
        );
      }))
    )
  );
}

// ── App ────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]         = useState('overview');
  const [stocks,setStocks]   = useState({data:null,loading:true,error:null});
  const [fiis,setFiis]       = useState({data:null,loading:true,error:null});
  const [crypto,setCrypto]   = useState({data:null,loading:true,error:null});
  const [comms,setComms]     = useState({data:null,loading:true,error:null});
  const [favorites,setFavorites] = useState(()=>{
    try{const s=localStorage.getItem('mhub:fav');return s?new Map(Object.entries(JSON.parse(s))):new Map();}catch{return new Map();}
  });
  const [selTicker,setSelTicker]     = useState(null);
  const [selCategory,setSelCategory] = useState(null);
  const [lastUpdate,setLastUpdate]   = useState(null);
  const [spinning,setSpinning]       = useState(false);

  useEffect(()=>{
    try{localStorage.setItem('mhub:fav',JSON.stringify(Object.fromEntries(favorites)));}catch(_e){}
  },[favorites]);

  const fetchStocks = async()=>{
    try{
      const [g,l]=await Promise.all([
        fetch(q(`${BASE}/quote/list?sortBy=change&sortOrder=desc&limit=10&type=stock`)).then(r=>r.json()),
        fetch(q(`${BASE}/quote/list?sortBy=change&sortOrder=asc&limit=10&type=stock`)).then(r=>r.json()),
      ]);
      const merge=arr=>(arr||[]).filter(s=>s.close>0&&Math.abs(s.change??0)<50);
      const uniq=Array.from(new Map([...merge(g.stocks),...merge(l.stocks)].map(s=>[s.stock,s])).values());
      setStocks({data:uniq.sort((a,b)=>(b.change??0)-(a.change??0)),loading:false,error:null});
    }catch(e){setStocks({data:null,loading:false,error:`Erro ações: ${e.message}`);}
  };
  const fetchFiis = async()=>{
    try{
      const [g,l]=await Promise.all([
        fetch(q(`${BASE}/quote/list?sortBy=change&sortOrder=desc&limit=10&type=fii`)).then(r=>r.json()),
        fetch(q(`${BASE}/quote/list?sortBy=change&sortOrder=asc&limit=10&type=fii`)).then(r=>r.json()),
      ]);
      const merge=arr=>(arr||[]).filter(s=>s.close>0);
      const uniq=Array.from(new Map([...merge(g.stocks),...merge(l.stocks)].map(s=>[s.stock,s])).values());
      setFiis({data:uniq.sort((a,b)=>(b.change??0)-(a.change??0)),loading:false,error:null});
    }catch(e){setFiis({data:null,loading:false,error:`Erro FIIs: ${e.message}`);}
  };
  const fetchCrypto = async()=>{
    try{
      const r=await fetch(q(`${BASE}/v2/crypto?coin=${CRYPTO_COINS}&currency=BRL`));
      const d=await r.json();
      setCrypto({data:(d.coins||[]).map(c=>({coin:c.coin,name:c.coinName,close:c.regularMarketPrice,change:c.regularMarketChangePercent,marketCap:c.marketCap})),loading:false,error:null});
    }catch(e){setCrypto({data:null,loading:false,error:`Erro cripto: ${e.message}`);}
  };
  const fetchComms = async()=>{
    try{
      const r=await fetch(q(`${BASE}/quote/${COMMODITY_TICKERS}?currency=BRL`));
      const d=await r.json();
      setComms({data:(d.results||[]).filter(x=>x.regularMarketPrice>0).map(x=>({stock:x.symbol,name:COMMODITY_NAMES[x.symbol]||x.shortName||x.symbol,close:x.regularMarketPrice,change:x.regularMarketChangePercent,low52:x.fiftyTwoWeekLow,high52:x.fiftyTwoWeekHigh})),loading:false,error:null});
    }catch(e){setComms({data:null,loading:false,error:`Erro commodities: ${e.message}`);}
  };

  const loadAll = useCallback(async()=>{
    setSpinning(true);
    setStocks(s=>({...s,loading:true})); setFiis(s=>({...s,loading:true}));
    setCrypto(s=>({...s,loading:true})); setComms(s=>({...s,loading:true}));
    await Promise.all([fetchStocks(),fetchFiis(),fetchCrypto(),fetchComms()]);
    setLastUpdate(new Date()); setSpinning(false);
  },[]);

  useEffect(()=>{loadAll();},[]);

  const toggleFav = useCallback((key,row)=>{
    setFavorites(prev=>{const n=new Map(prev);n.has(key)?n.delete(key):n.set(key,row);return n;});
  },[]);

  const favSet = new Set(favorites.keys());
  const selTick = (ticker,cat)=>{
    if(selTicker===ticker){setSelTicker(null);setSelCategory(null);}
    else{setSelTicker(ticker);setSelCategory(cat);}
  };

  const topStock  = stocks.data?.find(s=>s.change>0);
  const topFii    = fiis.data?.find(s=>s.change>0);
  const topCrypto = crypto.data?.[0];
  const topComm   = comms.data?.[0];

  const gainers=[
    ...(stocks.data?.filter(s=>s.change>0).slice(0,2).map(s=>({...s,cat:'stocks'}))||[]),
    ...(fiis.data?.filter(s=>s.change>0).slice(0,2).map(s=>({...s,cat:'fiis'}))||[]),
    ...(crypto.data?.filter(s=>s.change>0).slice(0,2).map(s=>({...s,stock:s.coin,cat:'crypto'}))||[]),
  ].sort((a,b)=>b.change-a.change).slice(0,5);

  const losers=[
    ...(stocks.data?.filter(s=>s.change<0).slice(-2).map(s=>({...s,cat:'stocks'}))||[]),
    ...(fiis.data?.filter(s=>s.change<0).slice(-2).map(s=>({...s,cat:'fiis'}))||[]),
    ...(crypto.data?.filter(s=>s.change<0).slice(-2).map(s=>({...s,stock:s.coin,cat:'crypto'}))||[]),
  ].sort((a,b)=>a.change-b.change).slice(0,5);

  const MiniRow = ({item})=>{
    const key=item.stock;
    const isFav=favSet.has(`${item.cat}:${key}`);
    const catLabel={stocks:'AÇÃO',fiis:'FII',crypto:'CRIPTO',commodities:'COMM'}[item.cat]??'';
    const chg=item.change??0;
    return h('div',{className:'mini-row'},
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h('div',null,
          h('div',{style:{fontFamily:'IBM Plex Mono',fontSize:12,fontWeight:700,color:'#e8f4ff'}},key),
          h('div',{style:{fontSize:10,color:'var(--text3)',marginTop:1}},catLabel)
        )
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},
        h('div',{style:{fontFamily:'IBM Plex Mono',fontSize:12,color:'var(--text2)'}},brl(item.close)),
        h('div',{style:{fontFamily:'IBM Plex Mono',fontSize:13,fontWeight:700,minWidth:70,textAlign:'right',color:chg>=0?'var(--green)':'var(--red)'}},
          `${chg>=0?'▲':'▼'} ${Math.abs(chg).toFixed(2)}%`
        ),
        h('button',{className:`fav-btn ${isFav?'on':''}`,onClick:()=>toggleFav(`${item.cat}:${key}`,item)},'★')
      )
    );
  };

  const stockCols=[
    {key:'close',label:'Preço',render:r=>h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close))},
    {key:'volume',label:'Volume',render:r=>r.volume?(r.volume/1e6).toFixed(1)+'M':'—'},
  ];
  const fiiCols=[
    {key:'close',label:'Cota',render:r=>h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close))},
    {key:'dividendYield',label:'DY',render:r=>r.dividendYield?`${r.dividendYield.toFixed(2)}%`:'—'},
  ];
  const cryptoCols=[
    {key:'close',label:'Preço (BRL)',render:r=>h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close))},
    {key:'marketCap',label:'Mkt Cap',render:r=>r.marketCap?`$${(r.marketCap/1e9).toFixed(1)}B`:'—'},
  ];
  const commCols=[
    {key:'close',label:'Preço',render:r=>h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close))},
    {key:'low52',label:'Mín 52s',render:r=>brl(r.low52)},
    {key:'high52',label:'Máx 52s',render:r=>brl(r.high52)},
  ];

  const SummaryCard=({label,val,change,badge})=>h('div',{className:'summary-card'},
    h('div',{className:'sc-label'},label),
    h('div',{className:'sc-val'},val??'—'),
    h('div',{className:`sc-change ${badge}`},change??'—')
  );

  const renderTab=()=>{
    if(tab==='overview') return h('div',null,
      h('div',{className:'section-label'},'Resumo dos mercados'),
      h('div',{className:'overview-grid'},
        h(SummaryCard,{label:'Maior Alta — Ações',val:topStock?brl(topStock.close):'—',change:topStock?`▲ ${topStock.change.toFixed(2)}% · ${topStock.stock}`:'—',badge:'pos'}),
        h(SummaryCard,{label:'Maior Alta — FIIs',val:topFii?brl(topFii.close):'—',change:topFii?`▲ ${topFii.change.toFixed(2)}% · ${topFii.stock}`:'—',badge:'pos'}),
        h(SummaryCard,{label:'Top Cripto',val:topCrypto?brl(topCrypto.close):'—',change:topCrypto?`${topCrypto.change>=0?'▲':'▼'} ${Math.abs(topCrypto.change??0).toFixed(2)}% · ${topCrypto.coin}`:'—',badge:topCrypto?.change>=0?'pos':'neg'}),
        h(SummaryCard,{label:'Top Commodity',val:topComm?brl(topComm.close):'—',change:topComm?`${topComm.change>=0?'▲':'▼'} ${Math.abs(topComm.change??0).toFixed(2)}% · ${topComm.name}`:'—',badge:topComm?.change>=0?'pos':'neg'})
      ),
      h('div',{className:'two-col'},
        h('div',null,h('div',{className:'section-label'},'Maiores altas'),h('div',{className:'table-wrap'},...(gainers.length?gainers.map(item=>h(MiniRow,{key:`${item.cat}:${item.stock}`,item})):[h(Spinner,{key:'s'})]))),
        h('div',null,h('div',{className:'section-label'},'Maiores baixas'),h('div',{className:'table-wrap'},...(losers.length?losers.map(item=>h(MiniRow,{key:`${item.cat}:${item.stock}`,item})):[h(Spinner,{key:'s'})])))
      ),
      favorites.size>0&&h('div',{style:{marginTop:24}},
        h('div',{className:'section-label'},`Seus favoritos (${favorites.size})`),
        h('div',{className:'table-wrap'},...Array.from(favorites.entries()).map(([k,row])=>{
          const cat=k.split(':')[0];
          return h(MiniRow,{key:k,item:{...row,stock:row.stock||row.coin||row.ticker,cat}});
        }))
      )
    );

    if(tab==='stocks') return h('div',null,
      h('div',{className:'section-label'},'Ações — B3'),
      h(MarketTable,{title:'Mercado de Ações',badge:'badge-blue',...stocks,favSet,onFav:toggleFav,category:'stocks',cols:stockCols,selTicker,onSel:t=>selTick(t,'stocks')}),
      selTicker&&selCategory==='stocks'&&h(DetailPanel,{ticker:selTicker,onClose:()=>setSelTicker(null)})
    );

    if(tab==='fiis') return h('div',null,
      h('div',{className:'section-label'},'Fundos Imobiliários — B3'),
      h(MarketTable,{title:'FIIs',badge:'badge-teal',...fiis,favSet,onFav:toggleFav,category:'fiis',cols:fiiCols,selTicker,onSel:t=>selTick(t,'fiis')}),
      selTicker&&selCategory==='fiis'&&h(DetailPanel,{ticker:selTicker,onClose:()=>setSelTicker(null)})
    );

    if(tab==='crypto') return h('div',null,
      h('div',{className:'section-label'},'Criptomoedas — preços em BRL'),
      h(MarketTable,{title:'Criptomoedas',badge:'badge-purple',...crypto,favSet,onFav:toggleFav,category:'crypto',cols:cryptoCols,selTicker:null,onSel:()=>{}})
    );

    if(tab==='commodities') return h('div',null,
      h('div',{className:'section-label'},'Commodities — cotações em BRL'),
      h(MarketTable,{title:'Commodities',badge:'badge-amber',...comms,favSet,onFav:toggleFav,category:'commodities',cols:commCols,selTicker,onSel:t=>selTick(t,'commodities')}),
      selTicker&&selCategory==='commodities'&&h(DetailPanel,{ticker:selTicker,onClose:()=>setSelTicker(null)})
    );

    if(tab==='favorites') return h('div',null,
      h('div',{className:'section-label'},`Favoritos — ${favorites.size} ativos salvos`),
      favorites.size===0
        ? h('div',{className:'table-wrap'},h('div',{className:'fav-empty'},h('div',{className:'fav-empty-icon'},'★'),h('div',{className:'fav-empty-text'},'Você ainda não tem favoritos.',h('br'),'Clique em ★ em qualquer ativo para salvar aqui.')))
        : h('div',{className:'table-wrap'},...Array.from(favorites.entries()).map(([k,row])=>{
            const cat=k.split(':')[0];
            const catLabel={stocks:'AÇÃO',fiis:'FII',crypto:'CRIPTO',commodities:'COMM'}[cat]??'';
            const ticker=row.stock||row.coin||row.ticker;
            const chg=row.change??0;
            return h('div',{key:k,style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',borderBottom:'1px solid rgba(28,45,64,.4)',cursor:'pointer'},onClick:()=>selTick(ticker,cat)},
              h('div',null,
                h('div',{style:{fontFamily:'IBM Plex Mono',fontSize:13,fontWeight:700,color:'#e8f4ff'}},ticker),
                h('div',{style:{fontSize:10,color:'var(--text3)',marginTop:1}},`${catLabel} · ${row.name||row.longName||''}`)
              ),
              h('div',{style:{display:'flex',alignItems:'center',gap:12}},
                h('div',{style:{fontFamily:'IBM Plex Mono',fontSize:12,color:'var(--text2)'}},brl(row.close)),
                h('div',{style:{fontFamily:'IBM Plex Mono',fontSize:13,fontWeight:700,color:chg>=0?'var(--green)':'var(--red)'}},`${chg>=0?'▲':'▼'} ${Math.abs(chg).toFixed(2)}%`),
                h('button',{className:'fav-btn on',onClick:e=>{e.stopPropagation();toggleFav(k,row);}},'★')
              )
            );
          }),
          selTicker&&h(DetailPanel,{key:selTicker,ticker:selTicker,onClose:()=>setSelTicker(null)})
        )
    );

    return null;
  };

  return h('div',null,
    h('div',{className:'header'},
      h('div',{className:'header-top'},
        h('div',{className:'logo'},
          h('div',{className:'logo-mark'},'M'),
          h('div',null,
            h('div',{className:'logo-name'},'Mercado',h('span',null,'Hub')),
            h('div',{className:'header-meta'},lastUpdate?`atualizado ${lastUpdate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`:'aguardando dados...')
          )
        ),
        h('button',{className:'refresh-btn',onClick:loadAll},spinning?'⟳ Atualizando...':'↺ Atualizar')
      ),
      h('div',{className:'tabs'},...TABS.map(t=>
        h('div',{key:t.id,className:`tab ${tab===t.id?'active':''} ${t.id==='favorites'?'fav-tab':''}`,onClick:()=>{setTab(t.id);setSelTicker(null);}},
          h('span',{style:{fontSize:11,opacity:.7,marginRight:4}},t.icon),t.label,
          t.id==='favorites'&&favorites.size>0&&h('span',{style:{background:'rgba(240,165,0,.2)',color:'var(--accent2)',borderRadius:10,fontSize:10,padding:'1px 6px',fontFamily:'IBM Plex Mono',fontWeight:600,marginLeft:4}},favorites.size)
        )
      ))
    ),
    h('div',{className:'page'},renderTab())
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
