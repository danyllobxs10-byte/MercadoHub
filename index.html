<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MercadoHub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23f0a500'/><text x='16' y='23' font-size='18' font-weight='800' text-anchor='middle' fill='%23000' font-family='sans-serif'>M</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.1/Recharts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#080c10; --bg1:#0d1219; --bg2:#111820; --bg3:#162030;
      --border:#1c2d40; --border2:#243550;
      --text:#c4d8ec; --text2:#5a7a9a; --text3:#334455;
      --accent:#f0a500; --accent2:#ffcc44;
      --green:#22c55e; --red:#ef4444; --blue:#3b9eff;
      --teal:#14b8a6; --purple:#8b5cf6;
    }
    html, body, #root { height: 100%; }
    body { background: var(--bg); font-family: 'Syne', sans-serif; color: var(--text); }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    .header { background: var(--bg1); border-bottom: 1px solid var(--border); padding: 16px 24px 0; position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg,var(--accent),#e08800); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #000; }
    .logo-name { font-size: 18px; font-weight: 800; letter-spacing: -.5px; color: #e8f4ff; }
    .logo-name span { color: var(--accent); }
    .header-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); }
    .refresh-btn { background: var(--bg2); border: 1px solid var(--border2); color: var(--text2); padding: 6px 12px; border-radius: 6px; font-size: 11px; font-family: 'Syne', sans-serif; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px; }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tabs { display: flex; gap: 2px; overflow-x: auto; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 9px 16px 11px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s; display: flex; align-items: center; gap: 6px; user-select: none; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab.fav-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
    .page { padding: 20px 24px; }
    .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
    .overview-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
    @media(max-width:900px){.overview-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:500px){.overview-grid{grid-template-columns:1fr 1fr}}
    .summary-card { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; transition: border-color .15s; }
    .summary-card:hover { border-color: var(--border2); }
    .sc-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; font-family: 'IBM Plex Mono', monospace; }
    .sc-val { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; color: #e8f4ff; }
    .sc-change { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; margin-top: 4px; }
    .pos { color: var(--green); } .neg { color: var(--red); } .neu { color: var(--text2); }
    .table-wrap { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .table-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-title { font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .badge-green { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
    .badge-blue  { background: rgba(59,158,255,.1);  color: var(--blue);   border: 1px solid rgba(59,158,255,.2); }
    .badge-amber { background: rgba(240,165,0,.1);   color: var(--accent); border: 1px solid rgba(240,165,0,.2); }
    .badge-teal  { background: rgba(20,184,166,.1);  color: var(--teal);   border: 1px solid rgba(20,184,166,.2); }
    .badge-purple{ background: rgba(139,92,246,.1);  color: var(--purple); border: 1px solid rgba(139,92,246,.2); }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); padding: 9px 14px; text-align: right; border-bottom: 1px solid var(--border); font-weight: 500; white-space: nowrap; }
    thead th:first-child { text-align: left; }
    tbody tr { cursor: pointer; transition: background .1s; }
    tbody tr:hover { background: var(--bg2); }
    tbody tr.row-active { background: rgba(240,165,0,.06); border-left: 2px solid var(--accent); }
    tbody td { font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 10px 14px; text-align: right; border-bottom: 1px solid rgba(28,45,64,.5); color: var(--text2); }
    tbody td:first-child { text-align: left; }
    tbody tr:last-child td { border-bottom: none; }
    .ticker-name { font-size: 13px; font-weight: 700; color: #e8f4ff; }
    .ticker-sub  { font-size: 10px; color: var(--text3); margin-top: 1px; font-family: 'Syne', sans-serif; }
    .fav-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; line-height: 1; padding: 2px 4px; transition: all .15s; border-radius: 4px; }
    .fav-btn:hover { color: var(--accent2); }
    .fav-btn.active { color: var(--accent2); }
    .change-cell { font-weight: 700; font-size: 13px; }
    .center-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; gap: 12px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--bg3); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); color: #ff8080; padding: 14px 18px; border-radius: 8px; font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
    .hint { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); text-align: center; padding: 12px; }
    .detail-panel { margin-top: 16px; background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; animation: slideUp .2s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .detail-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .detail-ticker { font-size: 22px; font-weight: 800; color: #f0f8ff; }
    .detail-name   { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .detail-price  { font-family: 'IBM Plex Mono', monospace; font-size: 26px; font-weight: 600; color: #f0f8ff; }
    .detail-badge  { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 5px; }
    .detail-body   { padding: 20px; display: flex; flex-direction: column; gap: 22px; }
    .sub-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
    .chart-wrap { height: 180px; }
    .hist-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
    @media(max-width:600px){.hist-grid{grid-template-columns:repeat(2,1fr)}}
    .hist-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; padding: 11px 12px; }
    .hist-period { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    .hist-price  { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text2); margin-bottom: 3px; }
    .hist-pct    { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 700; }
    .days-table { width: 100%; border-collapse: collapse; }
    .days-table th { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); text-align: right; padding: 7px 12px; border-bottom: 1px solid var(--border); font-weight: 500; }
    .days-table th:first-child { text-align: left; }
    .days-table td { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text2); text-align: right; padding: 9px 12px; border-bottom: 1px solid rgba(28,45,64,.4); }
    .days-table td:first-child { text-align: left; color: var(--text3); }
    .days-table tr:last-child td { border-bottom: none; }
    .days-table tr:hover td { background: var(--bg2); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:700px){.two-col{grid-template-columns:1fr}}
    .fav-empty { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 60px 20px; }
    .fav-empty-icon { font-size: 40px; opacity: .2; }
    .fav-empty-text { font-size: 13px; color: var(--text3); text-align: center; font-family: 'IBM Plex Mono', monospace; }
    .tt { background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px; padding: 7px 12px; }
    .tt-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text3); margin-bottom: 2px; }
    .tt-val   { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: #f0f8ff; }
    .mini-row { display:flex; align-items:center; justify-content:space-between; padding:9px 16px; border-bottom:1px solid rgba(28,45,64,.4); }
    .mini-row:last-child { border-bottom: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

const BASE  = "https://brapi.dev/api";
const TOKEN = "whTDtVbb5qbqH9PuhriuiD";
const q = (url) => `${url}${url.includes("?") ? "&" : "?"}token=${TOKEN}`;

const CRYPTO_COINS = "BTC,ETH,BNB,SOL,XRP,ADA,DOGE,AVAX";
const COMMODITY_TICKERS = "GC=F,CL=F,SI=F,NG=F,ZC=F,ZW=F";
const COMMODITY_NAMES = {"GC=F":"Ouro","CL=F":"Petróleo WTI","SI=F":"Prata","NG=F":"Gás Natural","ZC=F":"Milho","ZW=F":"Trigo"};
const TABS = [
  {id:"overview",label:"Visão Geral",icon:"⬡"},
  {id:"stocks",label:"Ações",icon:"◈"},
  {id:"fiis",label:"FIIs",icon:"◉"},
  {id:"crypto",label:"Criptos",icon:"◆"},
  {id:"commodities",label:"Commodities",icon:"◇"},
  {id:"favorites",label:"Favoritos",icon:"★"},
];

const brl = (v,d=2) => v==null||isNaN(v) ? "—" : Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:d});
const pct = (v) => v==null||isNaN(v) ? "—" : `${v>=0?"+":""}${Number(v).toFixed(2)}%`;
const pctChange = (f,t) => (f&&t&&f!==0) ? ((t-f)/f)*100 : null;
const fmtDate = (ts) => new Date(ts*1000).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
const fmtDateFull = (ts) => new Date(ts*1000).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"});
const getPriceAtDaysAgo = (history,days) => {
  if (!history?.length) return null;
  const target = Date.now()/1000 - days*86400;
  return history.reduce((b,e) => Math.abs(e.date-target)<Math.abs(b.date-target)?e:b, history[0])?.close ?? null;
};

function Spinner() {
  return <div className="center-box"><div className="spinner"/><span style={{fontSize:11,color:"var(--text3)",fontFamily:"IBM Plex Mono"}}>carregando...</span></div>;
}

function CustomTooltip({active,payload,label}) {
  if (!active||!payload?.length) return null;
  return <div className="tt"><div className="tt-label">{label}</div><div className="tt-val">{brl(payload[0]?.value)}</div></div>;
}

function DetailPanel({ticker, onClose}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const ref = useRef(null);

  useEffect(() => {
    setLoading(true); setData(null);
    fetch(q(`${BASE}/quote/${encodeURIComponent(ticker)}?range=1y&interval=1d`))
      .then(r=>r.json()).then(d=>setData(d.results?.[0]??null))
      .catch(()=>setData(null)).finally(()=>setLoading(false));
  }, [ticker]);

  useEffect(() => { setTimeout(()=>ref.current?.scrollIntoView({behavior:"smooth",block:"start"}),80); }, []);

  const history = data?.historicalDataPrice ?? [];
  const current = data?.regularMarketPrice;
  const last5 = history.slice(-5);
  const chartData = history.slice(-252).map(e=>({date:fmtDateFull(e.date),price:e.close}));
  const periods = [{label:"15d",days:15},{label:"30d",days:30},{label:"3m",days:90},{label:"6m",days:180},{label:"1a",days:365}];
  const changePct = data?.regularMarketChangePercent;
  const isPos = changePct >= 0;

  return (
    <div className="detail-panel" ref={ref}>
      {loading ? <Spinner/> : !data ? (
        <div className="center-box"><span className="hint">Dados indisponíveis para {ticker}</span></div>
      ) : <>
        <div className="detail-head">
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div className="detail-ticker">{data.symbol}</div>
              <button onClick={onClose} style={{background:"none",border:"1px solid var(--border)",color:"var(--text3)",borderRadius:5,padding:"2px 8px",cursor:"pointer",fontSize:11,fontFamily:"IBM Plex Mono"}}>✕ fechar</button>
            </div>
            <div className="detail-name">{data.shortName||data.longName||""}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div className="detail-price">{brl(current)}</div>
            <div className="detail-badge" style={{background:isPos?"rgba(34,197,94,.1)":"rgba(239,68,68,.1)",color:isPos?"var(--green)":"var(--red)",border:`1px solid ${isPos?"rgba(34,197,94,.25)":"rgba(239,68,68,.25)"}`}}>
              {isPos?"▲":"▼"} {Math.abs(changePct||0).toFixed(2)}%
            </div>
          </div>
        </div>
        <div className="detail-body">
          {chartData.length>0 && (
            <div>
              <div className="sub-title">Gráfico — 12 meses</div>
              <div className="chart-wrap">
                <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={chartData} margin={{top:4,right:4,left:-22,bottom:0}}>
                    <CartesianGrid stroke="rgba(28,45,64,.6)" strokeDasharray="3 3"/>
                    <XAxis dataKey="date" tick={{fontSize:9,fill:"#334455",fontFamily:"IBM Plex Mono"}} tickLine={false} interval={Math.floor(chartData.length/6)}/>
                    <YAxis tick={{fontSize:9,fill:"#334455",fontFamily:"IBM Plex Mono"}} tickLine={false} domain={["auto","auto"]} tickFormatter={v=>v.toFixed(0)}/>
                    <Tooltip content={<CustomTooltip/>}/>
                    <Line type="monotone" dataKey="price" stroke="var(--accent)" strokeWidth={1.5} dot={false} activeDot={{r:4,fill:"var(--accent)"}}/>
                  </LineChart>
                </ResponsiveContainer>
              </div>
            </div>
          )}
          {last5.length>0 && (
            <div>
              <div className="sub-title">Fechamento — últimos 5 dias</div>
              <table className="days-table">
                <thead><tr><th>Data</th><th>Abertura</th><th>Mín</th><th>Máx</th><th>Fechamento</th><th>Var.</th></tr></thead>
                <tbody>
                  {last5.map((d,i)=>{
                    const prev=last5[i-1]; const v=prev?pctChange(prev.close,d.close):null;
                    return <tr key={d.date}>
                      <td>{fmtDate(d.date)}</td><td>{brl(d.open)}</td>
                      <td style={{color:"var(--red)"}}>{brl(d.low)}</td>
                      <td style={{color:"var(--green)"}}>{brl(d.high)}</td>
                      <td style={{color:"#e8f4ff",fontWeight:600}}>{brl(d.close)}</td>
                      <td style={{color:v==null?"var(--text3)":v>=0?"var(--green)":"var(--red)",fontWeight:600}}>{v==null?"—":pct(v)}</td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
          )}
          <div>
            <div className="sub-title">Preço histórico vs. hoje</div>
            <div className="hist-grid">
              {periods.map(({label,days})=>{
                const past=getPriceAtDaysAgo(history,days); const ch=pctChange(past,current);
                return <div className="hist-card" key={label}>
                  <div className="hist-period">{label} atrás</div>
                  <div className="hist-price">{brl(past)}</div>
                  <div className="hist-pct" style={{color:ch==null?"var(--text3)":ch>=0?"var(--green)":"var(--red)"}}>{ch==null?"—":pct(ch)}</div>
                </div>;
              })}
            </div>
          </div>
        </div>
      </>}
    </div>
  );
}

function MarketTable({title,badge,data,loading,error,favorites,onToggleFav,category,columns,selectedTicker,onSelectTicker}) {
  if (loading) return <div className="table-wrap"><Spinner/></div>;
  if (error) return <div className="error-box">{error}</div>;
  return (
    <div className="table-wrap">
      <div className="table-header">
        <div className="table-title">{title} <span className={`badge ${badge}`}>{data?.length??0} ativos</span></div>
      </div>
      {!data?.length ? <div className="hint">Nenhum dado disponível</div> : (
        <table>
          <thead><tr>
            <th style={{textAlign:"left"}}>Ativo</th>
            {columns.map(c=><th key={c.key}>{c.label}</th>)}
            <th>Var. Hoje</th>
            <th style={{width:32}}></th>
          </tr></thead>
          <tbody>
            {data.map(row=>{
              const key=row.stock||row.coin||row.ticker;
              const isActive=selectedTicker===key;
              const isFav=favorites.has(`${category}:${key}`);
              const changePct=row.change??row.regularMarketChangePercent;
              const isPos=(changePct??0)>=0;
              return <tr key={key} className={isActive?"row-active":""} onClick={()=>onSelectTicker(key)}>
                <td><div><div className="ticker-name">{key}</div><div className="ticker-sub">{row.name||row.longName||row.shortName||""}</div></div></td>
                {columns.map(c=><td key={c.key} style={c.style??{}}>{c.render?c.render(row):row[c.key]??"—"}</td>)}
                <td className={`change-cell ${isPos?"pos":"neg"}`}>{isPos?"▲":"▼"} {Math.abs(changePct??0).toFixed(2)}%</td>
                <td onClick={e=>{e.stopPropagation();onToggleFav(`${category}:${key}`,row);}}>
                  <button className={`fav-btn ${isFav?"active":""}`}>★</button>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab]     = useState("overview");
  const [stocks, setStocks]       = useState({data:null,loading:true,error:null});
  const [fiis, setFiis]           = useState({data:null,loading:true,error:null});
  const [crypto, setCrypto]       = useState({data:null,loading:true,error:null});
  const [commodities, setCommodities] = useState({data:null,loading:true,error:null});
  const [favorites, setFavorites] = useState(()=>{
    try { const s=localStorage.getItem("mercadohub:favorites"); return s?new Map(Object.entries(JSON.parse(s))):new Map(); } catch(_e){return new Map();}
  });
  const [selectedTicker, setSelectedTicker] = useState(null);
  const [selectedCategory, setSelectedCategory] = useState(null);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [refreshing, setRefreshing] = useState(false);

  useEffect(()=>{
    try { localStorage.setItem("mercadohub:favorites",JSON.stringify(Object.fromEntries(favorites))); } catch(_e){}
  },[favorites]);

  const fetchStocks = async () => {
    try {
      const [g,l] = await Promise.all([
        fetch(q(`${BASE}/quote/list?sortBy=change&sortOrder=desc&limit=10&type=stock`)).then(r=>r.json()),
        fetch(q(`${BASE}/quote/list?sortBy=change&sortOrder=asc&limit=10&type=stock`)).then(r=>r.json()),
      ]);
      const merge=(arr)=>(arr||[]).filter(s=>s.close>0&&Math.abs(s.change??0)<50);
      const combined=[...merge(g.stocks),...merge(l.stocks)];
      const unique=Array.from(new Map(combined.map(s=>[s.stock,s])).values());
      setStocks({data:unique.sort((a,b)=>(b.change??0)-(a.change??0)),loading:false,error:null});
    } catch(e){setStocks({data:null,loading:false,error:`Erro ações: ${e.message}`});}
  };
  const fetchFiis = async () => {
    try {
      const [g,l] = await Promise.all([
        fetch(q(`${BASE}/quote/list?sortBy=change&sortOrder=desc&limit=10&type=fii`)).then(r=>r.json()),
        fetch(q(`${BASE}/quote/list?sortBy=change&sortOrder=asc&limit=10&type=fii`)).then(r=>r.json()),
      ]);
      const merge=(arr)=>(arr||[]).filter(s=>s.close>0);
      const combined=[...merge(g.stocks),...merge(l.stocks)];
      const unique=Array.from(new Map(combined.map(s=>[s.stock,s])).values());
      setFiis({data:unique.sort((a,b)=>(b.change??0)-(a.change??0)),loading:false,error:null});
    } catch(e){setFiis({data:null,loading:false,error:`Erro FIIs: ${e.message}`});}
  };
  const fetchCrypto = async () => {
    try {
      const r = await fetch(q(`${BASE}/v2/crypto?coin=${CRYPTO_COINS}&currency=BRL`));
      const d = await r.json();
      const coins=(d.coins||[]).map(c=>({coin:c.coin,name:c.coinName,close:c.regularMarketPrice,change:c.regularMarketChangePercent,marketCap:c.marketCap}));
      setCrypto({data:coins,loading:false,error:null});
    } catch(e){setCrypto({data:null,loading:false,error:`Erro cripto: ${e.message}`});}
  };
  const fetchCommodities = async () => {
    try {
      const r = await fetch(q(`${BASE}/quote/${COMMODITY_TICKERS}?currency=BRL`));
      const d = await r.json();
      const items=(d.results||[]).filter(x=>x.regularMarketPrice>0).map(x=>({stock:x.symbol,name:COMMODITY_NAMES[x.symbol]||x.shortName||x.symbol,close:x.regularMarketPrice,change:x.regularMarketChangePercent,low52:x.fiftyTwoWeekLow,high52:x.fiftyTwoWeekHigh}));
      setCommodities({data:items,loading:false,error:null});
    } catch(e){setCommodities({data:null,loading:false,error:`Erro commodities: ${e.message}`});}
  };

  const loadAll = useCallback(async () => {
    setRefreshing(true);
    setStocks(s=>({...s,loading:true})); setFiis(s=>({...s,loading:true}));
    setCrypto(s=>({...s,loading:true})); setCommodities(s=>({...s,loading:true}));
    await Promise.all([fetchStocks(),fetchFiis(),fetchCrypto(),fetchCommodities()]);
    setLastUpdate(new Date()); setRefreshing(false);
  }, []);

  useEffect(()=>{loadAll();},[]);

  const toggleFav = useCallback((key,row)=>{
    setFavorites(prev=>{const next=new Map(prev); next.has(key)?next.delete(key):next.set(key,row); return next;});
  },[]);

  const favSet = new Set(favorites.keys());
  const selectTicker = (ticker,category) => {
    if(selectedTicker===ticker){setSelectedTicker(null);setSelectedCategory(null);}
    else{setSelectedTicker(ticker);setSelectedCategory(category);}
  };

  const topStock  = stocks.data?.find(s=>s.change>0);
  const topFii    = fiis.data?.find(s=>s.change>0);
  const topCrypto = crypto.data?.[0];
  const topComm   = commodities.data?.[0];

  const overviewGainers=[
    ...(stocks.data?.filter(s=>s.change>0).slice(0,2).map(s=>({...s,cat:"stocks"}))||[]),
    ...(fiis.data?.filter(s=>s.change>0).slice(0,2).map(s=>({...s,cat:"fiis"}))||[]),
    ...(crypto.data?.filter(s=>s.change>0).slice(0,2).map(s=>({...s,stock:s.coin,cat:"crypto"}))||[]),
  ].sort((a,b)=>b.change-a.change).slice(0,5);

  const overviewLosers=[
    ...(stocks.data?.filter(s=>s.change<0).slice(-2).map(s=>({...s,cat:"stocks"}))||[]),
    ...(fiis.data?.filter(s=>s.change<0).slice(-2).map(s=>({...s,cat:"fiis"}))||[]),
    ...(crypto.data?.filter(s=>s.change<0).slice(-2).map(s=>({...s,stock:s.coin,cat:"crypto"}))||[]),
  ].sort((a,b)=>a.change-b.change).slice(0,5);

  const stockCols=[
    {key:"close",label:"Preço",render:r=><span style={{color:"#e8f4ff",fontWeight:600}}>{brl(r.close)}</span>},
    {key:"volume",label:"Volume",render:r=>r.volume?(r.volume/1e6).toFixed(1)+"M":"—"},
  ];
  const fiiCols=[
    {key:"close",label:"Cota",render:r=><span style={{color:"#e8f4ff",fontWeight:600}}>{brl(r.close)}</span>},
    {key:"dividendYield",label:"DY",render:r=>r.dividendYield?`${r.dividendYield.toFixed(2)}%`:"—"},
  ];
  const cryptoCols=[
    {key:"close",label:"Preço (BRL)",render:r=><span style={{color:"#e8f4ff",fontWeight:600}}>{brl(r.close)}</span>},
    {key:"marketCap",label:"Mkt Cap",render:r=>r.marketCap?`$${(r.marketCap/1e9).toFixed(1)}B`:"—"},
  ];
  const commCols=[
    {key:"close",label:"Preço",render:r=><span style={{color:"#e8f4ff",fontWeight:600}}>{brl(r.close)}</span>},
    {key:"low52",label:"Mín 52s",render:r=>brl(r.low52)},
    {key:"high52",label:"Máx 52s",render:r=>brl(r.high52)},
  ];

  const SummaryCard=({label,val,change,badge})=>(
    <div className="summary-card">
      <div className="sc-label">{label}</div>
      <div className="sc-val">{val??"—"}</div>
      <div className={`sc-change ${badge}`}>{change??"—"}</div>
    </div>
  );

  const MiniRow=({item,onFav,isFav})=>{
    const key=item.stock;
    const catLabel={stocks:"AÇÃO",fiis:"FII",crypto:"CRIPTO",commodities:"COMM"}[item.cat]??"";
    return (
      <div className="mini-row">
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div>
            <div style={{fontFamily:"IBM Plex Mono",fontSize:12,fontWeight:700,color:"#e8f4ff"}}>{key}</div>
            <div style={{fontSize:10,color:"var(--text3)",marginTop:1}}>{catLabel}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontFamily:"IBM Plex Mono",fontSize:12,color:"var(--text2)"}}>{brl(item.close)}</div>
          <div style={{fontFamily:"IBM Plex Mono",fontSize:13,fontWeight:700,minWidth:70,textAlign:"right",color:(item.change??0)>=0?"var(--green)":"var(--red)"}}>
            {(item.change??0)>=0?"▲":"▼"} {Math.abs(item.change??0).toFixed(2)}%
          </div>
          <button className={`fav-btn ${isFav?"active":""}`} onClick={()=>onFav(`${item.cat}:${key}`,item)}>★</button>
        </div>
      </div>
    );
  };

  const renderTab=()=>{
    switch(tab) {
      case "overview": return (
        <div>
          <div className="section-label">Resumo dos mercados</div>
          <div className="overview-grid">
            <SummaryCard label="Maior Alta — Ações" val={topStock?brl(topStock.close):"—"} change={topStock?`▲ ${topStock.change.toFixed(2)}% · ${topStock.stock}`:"—"} badge="pos"/>
            <SummaryCard label="Maior Alta — FIIs"  val={topFii?brl(topFii.close):"—"} change={topFii?`▲ ${topFii.change.toFixed(2)}% · ${topFii.stock}`:"—"} badge="pos"/>
            <SummaryCard label="Top Cripto" val={topCrypto?brl(topCrypto.close):"—"} change={topCrypto?`${topCrypto.change>=0?"▲":"▼"} ${Math.abs(topCrypto.change??0).toFixed(2)}% · ${topCrypto.coin}`:"—"} badge={topCrypto?.change>=0?"pos":"neg"}/>
            <SummaryCard label="Top Commodity" val={topComm?brl(topComm.close):"—"} change={topComm?`${topComm.change>=0?"▲":"▼"} ${Math.abs(topComm.change??0).toFixed(2)}% · ${topComm.name}`:"—"} badge={topComm?.change>=0?"pos":"neg"}/>
          </div>
          <div className="two-col">
            <div>
              <div className="section-label">Maiores altas</div>
              <div className="table-wrap">
                {overviewGainers.length===0?<Spinner/>:overviewGainers.map(item=>(
                  <MiniRow key={`${item.cat}:${item.stock}`} item={item} onFav={toggleFav} isFav={favSet.has(`${item.cat}:${item.stock}`)}/>
                ))}
              </div>
            </div>
            <div>
              <div className="section-label">Maiores baixas</div>
              <div className="table-wrap">
                {overviewLosers.length===0?<Spinner/>:overviewLosers.map(item=>(
                  <MiniRow key={`${item.cat}:${item.stock}`} item={item} onFav={toggleFav} isFav={favSet.has(`${item.cat}:${item.stock}`)}/>
                ))}
              </div>
            </div>
          </div>
          {favorites.size>0&&(
            <div style={{marginTop:24}}>
              <div className="section-label">Seus favoritos ({favorites.size})</div>
              <div className="table-wrap">
                {Array.from(favorites.entries()).map(([k,row])=>{
                  const cat=k.split(":")[0];
                  return <MiniRow key={k} item={{...row,stock:row.stock||row.coin||row.ticker,cat}} onFav={toggleFav} isFav={true}/>;
                })}
              </div>
            </div>
          )}
        </div>
      );
      case "stocks": return (
        <div>
          <div className="section-label">Ações — B3</div>
          <MarketTable title="Mercado de Ações" badge="badge-blue" data={stocks.data} loading={stocks.loading} error={stocks.error} favorites={favSet} onToggleFav={toggleFav} category="stocks" columns={stockCols} selectedTicker={selectedTicker} onSelectTicker={t=>selectTicker(t,"stocks")}/>
          {selectedTicker&&selectedCategory==="stocks"&&<DetailPanel ticker={selectedTicker} onClose={()=>setSelectedTicker(null)}/>}
        </div>
      );
      case "fiis": return (
        <div>
          <div className="section-label">Fundos Imobiliários — B3</div>
          <MarketTable title="FIIs" badge="badge-teal" data={fiis.data} loading={fiis.loading} error={fiis.error} favorites={favSet} onToggleFav={toggleFav} category="fiis" columns={fiiCols} selectedTicker={selectedTicker} onSelectTicker={t=>selectTicker(t,"fiis")}/>
          {selectedTicker&&selectedCategory==="fiis"&&<DetailPanel ticker={selectedTicker} onClose={()=>setSelectedTicker(null)}/>}
        </div>
      );
      case "crypto": return (
        <div>
          <div className="section-label">Criptomoedas — preços em BRL</div>
          <MarketTable title="Criptomoedas" badge="badge-purple" data={crypto.data} loading={crypto.loading} error={crypto.error} favorites={favSet} onToggleFav={toggleFav} category="crypto" columns={cryptoCols} selectedTicker={null} onSelectTicker={()=>{}}/>
        </div>
      );
      case "commodities": return (
        <div>
          <div className="section-label">Commodities — cotações em BRL</div>
          <MarketTable title="Commodities" badge="badge-amber" data={commodities.data} loading={commodities.loading} error={commodities.error} favorites={favSet} onToggleFav={toggleFav} category="commodities" columns={commCols} selectedTicker={selectedTicker} onSelectTicker={t=>selectTicker(t,"commodities")}/>
          {selectedTicker&&selectedCategory==="commodities"&&<DetailPanel ticker={selectedTicker} onClose={()=>setSelectedTicker(null)}/>}
        </div>
      );
      case "favorites": return (
        <div>
          <div className="section-label">Favoritos — {favorites.size} ativos salvos</div>
          {favorites.size===0?(
            <div className="table-wrap">
              <div className="fav-empty">
                <div className="fav-empty-icon">★</div>
                <div className="fav-empty-text">Você ainda não tem favoritos.<br/>Clique em ★ em qualquer ativo para salvar aqui.</div>
              </div>
            </div>
          ):(
            <div className="table-wrap">
              {Array.from(favorites.entries()).map(([k,row])=>{
                const cat=k.split(":")[0];
                const catLabel={stocks:"AÇÃO",fiis:"FII",crypto:"CRIPTO",commodities:"COMM"}[cat]??"";
                const ticker=row.stock||row.coin||row.ticker;
                return (
                  <div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:"1px solid rgba(28,45,64,.4)",cursor:"pointer"}} onClick={()=>selectTicker(ticker,cat)}>
                    <div>
                      <div style={{fontFamily:"IBM Plex Mono",fontSize:13,fontWeight:700,color:"#e8f4ff"}}>{ticker}</div>
                      <div style={{fontSize:10,color:"var(--text3)",marginTop:1}}>{catLabel} · {row.name||row.longName||""}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{fontFamily:"IBM Plex Mono",fontSize:12,color:"var(--text2)"}}>{brl(row.close)}</div>
                      <div style={{fontFamily:"IBM Plex Mono",fontSize:13,fontWeight:700,color:(row.change??0)>=0?"var(--green)":"var(--red)"}}>
                        {(row.change??0)>=0?"▲":"▼"} {Math.abs(row.change??0).toFixed(2)}%
                      </div>
                      <button className="fav-btn active" onClick={e=>{e.stopPropagation();toggleFav(k,row);}}>★</button>
                    </div>
                  </div>
                );
              })}
              {selectedTicker&&<DetailPanel ticker={selectedTicker} onClose={()=>setSelectedTicker(null)}/>}
            </div>
          )}
        </div>
      );
      default: return null;
    }
  };

  return (
    <div>
      <div className="header">
        <div className="header-top">
          <div className="logo">
            <div className="logo-mark">M</div>
            <div>
              <div className="logo-name">Mercado<span>Hub</span></div>
              <div className="header-meta">{lastUpdate?`atualizado ${lastUpdate.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}`:"aguardando dados..."}</div>
            </div>
          </div>
          <button className="refresh-btn" onClick={loadAll}>
            {refreshing?"⟳":"↺"} Atualizar
          </button>
        </div>
        <div className="tabs">
          {TABS.map(t=>(
            <div key={t.id} className={`tab ${tab===t.id?"active":""} ${t.id==="favorites"?"fav-tab":""}`} onClick={()=>{setTab(t.id);setSelectedTicker(null);}}>
              <span style={{fontSize:11,opacity:.7}}>{t.icon}</span> {t.label}
              {t.id==="favorites"&&favorites.size>0&&(
                <span style={{background:"rgba(240,165,0,.2)",color:"var(--accent2)",borderRadius:10,fontSize:10,padding:"1px 6px",fontFamily:"IBM Plex Mono",fontWeight:600,marginLeft:2}}>{favorites.size}</span>
              )}
            </div>
          ))}
        </div>
      </div>
      <div className="page">{renderTab()}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
