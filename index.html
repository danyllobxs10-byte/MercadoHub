*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c10;--bg1:#0d1219;--bg2:#111820;--border:#1c2d40;--text:#c4d8ec;--dim:#5a7a9a;--faint:#334455;--gold:#f0a500;--green:#22c55e;--red:#ef4444;--blue:#3b9eff;--teal:#14b8a6;--purple:#8b5cf6;--orange:#f97316}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
.hdr{background:var(--bg1);border-bottom:1px solid var(--border);padding:14px 20px 0;position:sticky;top:0;z-index:99}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-m{width:30px;height:30px;border-radius:7px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;font-size:15px}
.logo-n{font-size:17px;font-weight:800;color:#e8f4ff}.logo-n span{color:var(--gold)}
.meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--faint);margin-top:2px}
.btn{background:var(--bg2);border:1px solid var(--border);color:var(--dim);padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Syne',sans-serif}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.tabs{display:flex;overflow-x:auto}.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 15px 10px;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}
.tab:hover{color:var(--text)}.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab.fav.on{color:#ffcc44;border-bottom-color:#ffcc44}
.fav-count{background:rgba(240,165,0,.2);color:#ffcc44;border-radius:10px;font-size:10px;padding:1px 6px;font-family:'IBM Plex Mono',monospace;font-weight:600;margin-left:4px}
.page{padding:18px 20px}
.lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:800px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:13px 15px}
.card-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.card-val{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;color:#e8f4ff}
.card-chg{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;margin-top:4px}
.pos{color:var(--green)}.neg{color:var(--red)}
.movers{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:650px){.movers{grid-template-columns:1fr}}
.mover-box{background:var(--bg1);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.mover-title{padding:11px 15px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--green);box-shadow:0 0 5px var(--green)}
.dot-r{background:var(--red);box-shadow:0 0 5px var(--red)}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid rgba(28,45,64,.35);cursor:pointer;transition:background .1s}
.mrow:last-child{border-bottom:none}
.mrow:hover{background:var(--bg2)}
.mrow-left{display:flex;flex-direction:column;gap:2px}
.tn{font-size:13px;font-weight:700;color:#e8f4ff;font-family:'IBM Plex Mono',monospace}
.ts{font-size:10px;color:var(--faint)}
.mrow-right{display:flex;align-items:center;gap:10px}
.mprice{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim)}
.mchg{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;min-width:72px;text-align:right}
.fav-btn{background:none;border:none;cursor:pointer;color:var(--faint);font-size:15px;padding:2px 5px;transition:color .15s}
.fav-btn:hover,.fav-btn.on{color:#ffcc44}
.tbl-wrap{background:var(--bg1);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:16px}
.tbl-head{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700}
.bdg{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px}
.bdg-blue{background:rgba(59,158,255,.1);color:var(--blue);border:1px solid rgba(59,158,255,.2)}
.bdg-teal{background:rgba(20,184,166,.1);color:var(--teal);border:1px solid rgba(20,184,166,.2)}
.bdg-purple{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.2)}
.bdg-gold{background:rgba(240,165,0,.1);color:var(--gold);border:1px solid rgba(240,165,0,.2)}
table{width:100%;border-collapse:collapse}
th{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--faint);padding:8px 14px;text-align:right;border-bottom:1px solid var(--border);font-weight:500;white-space:nowrap}
th:first-child{text-align:left}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--bg2)}
tbody tr.sel td{background:rgba(240,165,0,.04)}
td{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:10px 14px;text-align:right;border-bottom:1px solid rgba(28,45,64,.4);color:var(--dim)}
td:first-child{text-align:left}
tbody tr:last-child td{border-bottom:none}
.chg{font-weight:700;font-size:13px}
/* EXPLORE */
.search-bar{display:flex;gap:10px;margin-bottom:14px}
.search-input{flex:1;background:var(--bg1);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:13px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--faint)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter-btn{background:var(--bg1);border:1px solid var(--border);color:var(--dim);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--gold);color:var(--gold)}
.filter-btn.on{background:rgba(240,165,0,.12);border-color:var(--gold);color:var(--gold)}
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.asset-card{background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:13px 15px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.asset-card:hover{border-color:#243550;background:var(--bg2)}
.asset-card.sel{border-color:var(--gold);background:rgba(240,165,0,.04)}
.ac-left{display:flex;flex-direction:column;gap:3px;min-width:0}
.ac-ticker{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#e8f4ff}
.ac-name{font-size:10px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.ac-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.ac-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 6px;border-radius:3px;font-weight:600}
.tag-blue{background:rgba(59,158,255,.1);color:var(--blue)}
.tag-gold{background:rgba(240,165,0,.1);color:var(--gold)}
.tag-green{background:rgba(34,197,94,.1);color:var(--green)}
.tag-teal{background:rgba(20,184,166,.1);color:var(--teal)}
.tag-purple{background:rgba(139,92,246,.1);color:var(--purple)}
.tag-orange{background:rgba(249,115,22,.1);color:var(--orange)}
.tag-dim{background:rgba(90,122,154,.1);color:var(--dim)}
.ac-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:10px}
.ac-price{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:#e8f4ff}
.ac-chg{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700}
.temp-bar{display:flex;align-items:center;gap:5px;margin-top:3px}
.temp-dots{display:flex;gap:2px}
.temp-dot{width:6px;height:6px;border-radius:50%;background:var(--faint)}
.temp-dot.lit-red{background:var(--red)}
.temp-dot.lit-orange{background:var(--orange)}
.temp-dot.lit-dim{background:var(--dim)}
.temp-dot.lit-green{background:#86efac}
.temp-dot.lit-bright{background:var(--green)}
.temp-label{font-family:'IBM Plex Mono',monospace;font-size:9px}

.det{background:var(--bg1);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-top:16px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.det-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}

.det-body{padding:18px;display:flex;flex-direction:column;gap:20px}
.sub{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:10px}

.hper{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--faint);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.hpri{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);margin-bottom:3px}
.hpct{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700}
.dtbl{width:100%;border-collapse:collapse}
.dtbl th{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--faint);text-align:right;padding:6px 11px;border-bottom:1px solid var(--border);font-weight:500}
.dtbl th:first-child{text-align:left}
.dtbl td{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);text-align:right;padding:8px 11px;border-bottom:1px solid rgba(28,45,64,.35)}
.dtbl td:first-child{text-align:left;color:var(--faint)}
.dtbl tr:last-child td{border-bottom:none}
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:36px;flex-direction:column;gap:10px}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint)}
.err-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ff8080;padding:13px 16px;border-radius:8px;font-size:12px;font-family:'IBM Plex Mono',monospace}

function brl(v,d){d=d||2;if(v==null||isNaN(v))return"—";return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:d});}
function pct(v){if(v==null||isNaN(v))return"—";return(v>=0?"+":"")+Number(v).toFixed(2)+"%";}
function pctChg(f,t){return(f&&t&&f!==0)?(t-f)/f*100:null;}
function fmtD(ts){return new Date(ts*1000).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});}
function priceAt(hist,days){
  if(!hist||!hist.length)return null;
  var t=Date.now()/1000-days*86400;
  return hist.reduce(function(b,e){return Math.abs(e.date-t)<Math.abs(b.date-t)?e:b;},hist[0]).close||null;
}
function fmtBig(v){
  if(!v||isNaN(v))return"—";
  if(v>=1e12)return"R$"+(v/1e12).toFixed(1)+"T";
  if(v>=1e9)return"R$"+(v/1e9).toFixed(1)+"B";
  if(v>=1e6)return"R$"+(v/1e6).toFixed(1)+"M";
  return brl(v);
}
function segColor(seg){
  return{"blue-chip":"tag-blue","mid-cap":"tag-gold","small-cap":"tag-orange","fii":"tag-teal","crypto":"tag-purple","commodity":"tag-green"}[seg]||"tag-dim";
}
function segLabel(seg){
  return{"blue-chip":"Blue Chip","mid-cap":"Mid Cap","small-cap":"Small Cap","fii":"FII","crypto":"Cripto","commodity":"Commodity"}[seg]||seg;
}
function tempInfo(chg){
  if(chg==null)return{label:"—",level:0};
  if(chg<=-3)return{label:"Forte queda",level:-2};
  if(chg<0)return{label:"Em queda",level:-1};
  if(chg<1)return{label:"Estável",level:0};
  if(chg<3)return{label:"Em alta",level:1};
  return{label:"Forte alta",level:2};
}

function Spin(){return h('div',{className:'spin-wrap'},h('div',{className:'spin'}),h('span',{className:'spin-lbl'},'carregando...'));}

function TempBar(p){
  var info=tempInfo(p.chg),level=info.level;
  var cfgs=[{c:level<=-2?'lit-red':''},{c:level<=-1?'lit-orange':''},{c:level===0?'lit-dim':''},{c:level>=1?'lit-green':''},{c:level>=2?'lit-bright':''}];
  return h('div',{className:'temp-bar'},
    h('div',{className:'temp-dots'},cfgs.map(function(c,i){return h('div',{key:i,className:'temp-dot '+(c.c||'')});})),
    h('span',{className:'temp-label',style:{color:level<0?'var(--red)':level>0?'var(--green)':'var(--dim)'}},info.label)
  );
}

      ?q(BASE+'/v2/crypto?coin='+encodeURIComponent(ticker)+'&currency=BRL')
      :q(BASE+'/quote/'+encodeURIComponent(ticker)+'?range=1y&interval=1d');
    fetch(url)
      .then(function(r){return r.json();})
      .then(function(d){
        console.log('[MercadoHub] resposta para '+ticker+':', JSON.stringify(d).slice(0,200));
        var result;
        if(isCrypto){
          var coin=d.coins&&d.coins[0];
          if(coin)result={symbol:coin.coin,shortName:coin.coinName,regularMarketPrice:coin.regularMarketPrice,regularMarketChangePercent:coin.regularMarketChangePercent,regularMarketVolume:coin.regularMarketVolume,marketCap:coin.marketCap,historicalDataPrice:[]};
        }else{
          result=d.results&&d.results[0]?d.results[0]:null;
        }
        if(!result){setErr("Ticker não encontrado: "+ticker);}
        else if(!result.regularMarketPrice&&!result.regularMarketPreviousClose&&!result.symbol){setErr("Dados indisponíveis para "+ticker+".");}
        else{setData(result);}

      .catch(function(ex){console.error('[MercadoHub] erro para '+ticker+':',ex);setErr("Erro ao carregar "+ticker+": "+ex.message);})

    {l:'Abertura',v:brl(data.regularMarketOpen)},

  return h('div',{className:'det',ref:ref},
    h('div',{className:'det-head'},

          onClose&&h('button',{className:'close-btn',onClick:onClose},'✕ fechar')
        ),

      h('div',{style:{display:'flex',alignItems:'center',gap:10}},

            return h('tr',{key:d.date},

      var combined=merge(res[0].stocks).concat(merge(res[1].stocks));
      var map=new Map();combined.forEach(function(s){map.set(s.stock,s);});
      setStocks({data:Array.from(map.values()).sort(function(a,b){return(b.change||0)-(a.change||0);}),loading:false,error:null});
    }).catch(function(e){setStocks({data:null,loading:false,error:'Erro ações: '+e.message});});
  }
  function fetchFiis(){
    return Promise.all([
      fetch(q(BASE+'/quote/list?sortBy=change&sortOrder=desc&limit=10&type=fii')).then(function(r){return r.json();}),
      fetch(q(BASE+'/quote/list?sortBy=change&sortOrder=asc&limit=10&type=fii')).then(function(r){return r.json();})
    ]).then(function(res){
      function merge(arr){return(arr||[]).filter(function(s){return s.close>0;});}
      var combined=merge(res[0].stocks).concat(merge(res[1].stocks));
      var map=new Map();combined.forEach(function(s){map.set(s.stock,s);});
      setFiis({data:Array.from(map.values()).sort(function(a,b){return(b.change||0)-(a.change||0);}),loading:false,error:null});
    }).catch(function(e){setFiis({data:null,loading:false,error:'Erro FIIs: '+e.message});});
  }
  function fetchCrypto(){
    return fetch(q(BASE+'/v2/crypto?coin='+CRYPTO_LIST+'&currency=BRL'))
      .then(function(r){return r.json();})
      .then(function(d){setCrypto({data:(d.coins||[]).map(function(c){return{coin:c.coin,name:c.coinName,close:c.regularMarketPrice,change:c.regularMarketChangePercent,marketCap:c.marketCap};}),loading:false,error:null});})
      .catch(function(e){setCrypto({data:null,loading:false,error:'Erro cripto: '+e.message});});
  }
  function fetchComms(){
    return fetch(q(BASE+'/quote/'+COMMS_LIST+'?currency=BRL'))
      .then(function(r){return r.json();})
      .then(function(d){setComms({data:(d.results||[]).filter(function(x){return x.regularMarketPrice>0;}).map(function(x){return{stock:x.symbol,name:CNAMES[x.symbol]||x.shortName||x.symbol,close:x.regularMarketPrice,change:x.regularMarketChangePercent,low52:x.fiftyTwoWeekLow,high52:x.fiftyTwoWeekHigh};}),loading:false,error:null});})
      .catch(function(e){setComms({data:null,loading:false,error:'Erro commodities: '+e.message});});
  }

  function loadAll(){
    setSpinning(true);
    setStocks(function(s){return Object.assign({},s,{loading:true});});
    setFiis(function(s){return Object.assign({},s,{loading:true});});
    setCrypto(function(s){return Object.assign({},s,{loading:true});});
    setComms(function(s){return Object.assign({},s,{loading:true});});
    Promise.all([fetchStocks(),fetchFiis(),fetchCrypto(),fetchComms()]).then(function(){setLastUpdate(new Date());setSpinning(false);});
  }
  useEffect(function(){loadAll();},[]);

  function toggleFav(key,row){setFavorites(function(prev){var n=new Map(prev);n.has(key)?n.delete(key):n.set(key,row);return n;});}
  var favSet=new Set(favorites.keys());

  // selecionar ticker — categoria determina se é cripto ou não
  function selTick(ticker,cat){
    if(selTicker===ticker){setSelTicker(null);setSelCat(null);}
    else{setSelTicker(ticker);setSelCat(cat);}
  }

  var gainers=(stocks.data||[]).filter(function(s){return s.change>0;}).slice(0,5);
  var losers=(stocks.data||[]).filter(function(s){return s.change<0;}).slice(-5).reverse();
  var topStock=stocks.data&&stocks.data.find(function(s){return s.change>0;});
  var topFii=fiis.data&&fiis.data.find(function(s){return s.change>0;});
  var topCrypto=crypto.data&&crypto.data[0];
  var topComm=comms.data&&comms.data[0];

  function SummaryCard(p){
    return h('div',{className:'card'},h('div',{className:'card-lbl'},p.label),h('div',{className:'card-val'},p.val||'—'),h('div',{className:'card-chg '+(p.badge||'')},p.change||'—'));
  }

  function MoverRow(p){
    var item=p.item,isGain=p.isGain;
    var key=item.stock||item.coin;
    var cat=item.cat||'stocks';
    var isFav=favSet.has(cat+':'+key);
    var chg=item.change||0;
    return h('div',{className:'mrow',onClick:function(){selTick(key,cat);}},
      h('div',{className:'mrow-left'},h('div',{className:'tn'},key),h('div',{className:'ts'},item.name||item.longName||item.shortName||'')),
      h('div',{className:'mrow-right'},
        h('div',{className:'mprice'},brl(item.close)),
        h('div',{className:'mchg '+(isGain?'pos':'neg')},(isGain?'▲':'▼')+' '+Math.abs(chg).toFixed(2)+'%'),
        h('button',{className:'fav-btn '+(isFav?'on':''),onClick:function(e){e.stopPropagation();toggleFav(cat+':'+key,item);}},'★')
      )
    );
  }

  var stockCols=[
    {key:'close',label:'Preço',render:function(r){return h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close));}},
    {key:'volume',label:'Volume',render:function(r){return r.volume?(r.volume/1e6).toFixed(1)+'M':'—';}},
  ];
  var fiiCols=[
    {key:'close',label:'Cota',render:function(r){return h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close));}},
    {key:'dividendYield',label:'DY',render:function(r){return r.dividendYield?r.dividendYield.toFixed(2)+'%':'—';}},
  ];
  var cryptoCols=[
    {key:'close',label:'Preço (BRL)',render:function(r){return h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close));}},
    {key:'marketCap',label:'Mkt Cap',render:function(r){return r.marketCap?'$'+(r.marketCap/1e9).toFixed(1)+'B':'—';}},
  ];
  var commCols=[
    {key:'close',label:'Preço',render:function(r){return h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close));}},
    {key:'low52',label:'Mín 52s',render:function(r){return brl(r.low52);}},
    {key:'high52',label:'Máx 52s',render:function(r){return brl(r.high52);}},
  ];

  function renderTab(){
    if(tab==='overview')return h('div',null,
      h('div',{className:'lbl'},'Resumo dos mercados'),
      h('div',{className:'cards'},
        h(SummaryCard,{label:'Maior Alta — Ações',val:topStock?brl(topStock.close):'—',change:topStock?'▲ '+topStock.change.toFixed(2)+'% · '+topStock.stock:'—',badge:'pos'}),
        h(SummaryCard,{label:'Maior Alta — FIIs',val:topFii?brl(topFii.close):'—',change:topFii?'▲ '+topFii.change.toFixed(2)+'% · '+topFii.stock:'—',badge:'pos'}),
        h(SummaryCard,{label:'Top Cripto',val:topCrypto?brl(topCrypto.close):'—',change:topCrypto?(topCrypto.change>=0?'▲':'▼')+' '+Math.abs(topCrypto.change||0).toFixed(2)+'% · '+topCrypto.coin:'—',badge:topCrypto&&topCrypto.change>=0?'pos':'neg'}),
        h(SummaryCard,{label:'Top Commodity',val:topComm?brl(topComm.close):'—',change:topComm?(topComm.change>=0?'▲':'▼')+' '+Math.abs(topComm.change||0).toFixed(2)+'% · '+topComm.name:'—',badge:topComm&&topComm.change>=0?'pos':'neg'})
      ),
      h('div',{className:'lbl'},'Maiores movimentações do dia'),
      h('div',{className:'movers'},
        h('div',{className:'mover-box'},h('div',{className:'mover-title'},h('div',{className:'dot dot-g'}),'Maiores Altas'),
          stocks.loading?h(Spin):gainers.length?gainers.map(function(item){return h(MoverRow,{key:item.stock,item:Object.assign({},item,{cat:'stocks'}),isGain:true});}):h('div',{className:'hint'},'Sem dados')
        ),
        h('div',{className:'mover-box'},h('div',{className:'mover-title'},h('div',{className:'dot dot-r'}),'Maiores Baixas'),
          stocks.loading?h(Spin):losers.length?losers.map(function(item){return h(MoverRow,{key:item.stock,item:Object.assign({},item,{cat:'stocks'}),isGain:false});}):h('div',{className:'hint'},'Sem dados')
        )
      ),
      selTicker&&selCat==='stocks'&&h(Detail,{key:selTicker,ticker:selTicker,isCrypto:false,onClose:function(){setSelTicker(null);}})
    );

    if(tab==='explore')return h(ExploreTab,{favSet:favSet,onFav:toggleFav});

    if(tab==='stocks')return h('div',null,
      h('div',{className:'lbl'},'Ações — B3'),
      h(MktTable,{title:'Mercado de Ações',badge:'bdg-blue',data:stocks.data,loading:stocks.loading,error:stocks.error,favSet:favSet,onFav:toggleFav,cat:'stocks',cols:stockCols,selTicker:selTicker,onSel:function(t){selTick(t,'stocks');}}),
      selTicker&&selCat==='stocks'&&h(Detail,{key:selTicker,ticker:selTicker,isCrypto:false,onClose:function(){setSelTicker(null);}})
    );

    if(tab==='fiis')return h('div',null,
      h('div',{className:'lbl'},'Fundos Imobiliários — B3'),
      h(MktTable,{title:'FIIs',badge:'bdg-teal',data:fiis.data,loading:fiis.loading,error:fiis.error,favSet:favSet,onFav:toggleFav,cat:'fiis',cols:fiiCols,selTicker:selTicker,onSel:function(t){selTick(t,'fiis');}}),
      selTicker&&selCat==='fiis'&&h(Detail,{key:selTicker,ticker:selTicker,isCrypto:false,onClose:function(){setSelTicker(null);}})
    );

    if(tab==='crypto')return h('div',null,
      h('div',{className:'lbl'},'Criptomoedas — preços em BRL'),
      h(MktTable,{title:'Criptomoedas',badge:'bdg-purple',data:crypto.data,loading:crypto.loading,error:crypto.error,favSet:favSet,onFav:toggleFav,cat:'crypto',cols:cryptoCols,selTicker:null,onSel:function(){}})
    );

    if(tab==='commodities')return h('div',null,
      h('div',{className:'lbl'},'Commodities — cotações em BRL'),
      h(MktTable,{title:'Commodities',badge:'bdg-gold',data:comms.data,loading:comms.loading,error:comms.error,favSet:favSet,onFav:toggleFav,cat:'commodities',cols:commCols,selTicker:selTicker,onSel:function(t){selTick(t,'commodities');}}),
      selTicker&&selCat==='commodities'&&h(Detail,{key:selTicker,ticker:selTicker,isCrypto:false,onClose:function(){setSelTicker(null);}})
    );

    if(tab==='favorites')return h('div',null,
      h('div',{className:'lbl'},'Favoritos — '+favorites.size+' ativos salvos'),
      favorites.size===0
        ?h('div',{className:'tbl-wrap'},h('div',{className:'fav-empty'},h('div',{className:'fav-ei'},'★'),h('div',{className:'fav-et'},'Você ainda não tem favoritos.',h('br'),'Clique em ★ em qualquer ativo para salvar aqui.')))
        :h('div',null,
          h('div',{className:'mover-box'},Array.from(favorites.entries()).map(function(entry){
            var k=entry[0],row=entry[1];
            var cat=k.split(':')[0];
            var catLabel={'stocks':'AÇÃO','fiis':'FII','crypto':'CRIPTO','commodities':'COMM','commodity':'COMM','blue-chip':'AÇÃO','mid-cap':'AÇÃO','small-cap':'AÇÃO','fii':'FII'}[cat]||'';
            var ticker=row.stock||row.coin||row.ticker;
            var chg=row.change||0;
            return h('div',{key:k,className:'mrow',onClick:function(){setSelTicker(selTicker===ticker?null:ticker);setSelCat(cat==='crypto'?'crypto':'stocks');}},
              h('div',{className:'mrow-left'},h('div',{className:'tn'},ticker),h('div',{className:'ts'},catLabel+' · '+(row.name||row.longName||''))),
              h('div',{className:'mrow-right'},
                h('div',{className:'mprice'},brl(row.close)),
                h('div',{className:'mchg '+(chg>=0?'pos':'neg')},(chg>=0?'▲':'▼')+' '+Math.abs(chg).toFixed(2)+'%'),
                h('button',{className:'fav-btn on',onClick:function(e){e.stopPropagation();toggleFav(k,row);}},'★')
              )
            );
          })),
          selTicker&&h(Detail,{key:selTicker,ticker:selTicker,isCrypto:selCat==='crypto',onClose:function(){setSelTicker(null);}})
        )
    );
    return null;
  }

  return h('div',null,
    h('div',{className:'hdr'},
      h('div',{className:'hdr-top'},
        h('div',{className:'logo'},
          h('div',{className:'logo-m'},'M'),
          h('div',null,
            h('div',{className:'logo-n'},'Mercado',h('span',null,'Hub')),
            h('div',{className:'meta'},lastUpdate?'atualizado '+lastUpdate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'aguardando dados...')
          )
        ),
        h('button',{className:'btn',onClick:loadAll},spinning?'⟳ Atualizando...':'↺ Atualizar')
      ),
      h('div',{className:'tabs'},TABS.map(function(t){
        var isOn=tab===t.id,isFav=t.id==='favorites';
        return h('div',{key:t.id,className:'tab '+(isOn?'on':'')+' '+(isFav?'fav':''),onClick:function(){setTab(t.id);setSelTicker(null);}},
          h('span',{style:{marginRight:4,opacity:.7}},t.icon),t.label,
          isFav&&favorites.size>0&&h('span',{className:'fav-count'},favorites.size)
        );
      }))
    ),
    h('div',{className:'page'},renderTab())
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
