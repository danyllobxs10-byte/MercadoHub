<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MercadoHub</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c10;--bg1:#0d1219;--bg2:#111820;--border:#1c2d40;--text:#c4d8ec;--dim:#5a7a9a;--faint:#334455;--gold:#f0a500;--green:#22c55e;--red:#ef4444;--blue:#3b9eff;--teal:#14b8a6;--purple:#8b5cf6}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
/* HEADER */
.hdr{background:var(--bg1);border-bottom:1px solid var(--border);padding:14px 20px 0;position:sticky;top:0;z-index:99}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-m{width:30px;height:30px;border-radius:7px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;font-size:15px}
.logo-n{font-size:17px;font-weight:800;color:#e8f4ff}.logo-n span{color:var(--gold)}
.meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--faint);margin-top:2px}
.btn{background:var(--bg2);border:1px solid var(--border);color:var(--dim);padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Syne',sans-serif}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.tabs{display:flex;overflow-x:auto}.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 15px 10px;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}
.tab:hover{color:var(--text)}.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab.fav.on{color:#ffcc44;border-bottom-color:#ffcc44}
/* PAGE */
.page{padding:18px 20px}
.lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
/* SUMMARY CARDS */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:800px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:13px 15px}
.card-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.card-val{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;color:#e8f4ff}
.card-chg{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;margin-top:4px}
.pos{color:var(--green)}.neg{color:var(--red)}
/* MOVERS GRID - altas e baixas lado a lado */
.movers{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:650px){.movers{grid-template-columns:1fr}}
.mover-box{background:var(--bg1);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.mover-title{padding:11px 15px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--green);box-shadow:0 0 5px var(--green)}
.dot-r{background:var(--red);box-shadow:0 0 5px var(--red)}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid rgba(28,45,64,.35);cursor:pointer;transition:background .1s}
.mrow:last-child{border-bottom:none}
.mrow:hover{background:var(--bg2)}
.mrow-left{display:flex;align-items:center;gap:10px}
.tn{font-size:13px;font-weight:700;color:#e8f4ff;font-family:'IBM Plex Mono',monospace}
.ts{font-size:10px;color:var(--faint);margin-top:1px}
.mrow-right{display:flex;align-items:center;gap:12px}
.mprice{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim)}
.mchg{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;min-width:72px;text-align:right}
.fav-btn{background:none;border:none;cursor:pointer;color:var(--faint);font-size:15px;padding:2px 5px;transition:color .15s}
.fav-btn:hover,.fav-btn.on{color:#ffcc44}
/* TABLE */
.tbl-wrap{background:var(--bg1);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:16px}
.tbl-head{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700}
.bdg{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px}
.bdg-blue{background:rgba(59,158,255,.1);color:var(--blue);border:1px solid rgba(59,158,255,.2)}
.bdg-teal{background:rgba(20,184,166,.1);color:var(--teal);border:1px solid rgba(20,184,166,.2)}
.bdg-purple{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.2)}
.bdg-gold{background:rgba(240,165,0,.1);color:var(--gold);border:1px solid rgba(240,165,0,.2)}
table{width:100%;border-collapse:collapse}
th{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--faint);padding:8px 14px;text-align:right;border-bottom:1px solid var(--border);font-weight:500;white-space:nowrap}
th:first-child{text-align:left}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--bg2)}
tbody tr.sel td{background:rgba(240,165,0,.05)}
td{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:10px 14px;text-align:right;border-bottom:1px solid rgba(28,45,64,.4);color:var(--dim)}
td:first-child{text-align:left}
tbody tr:last-child td{border-bottom:none}
.chg{font-weight:700;font-size:13px}
/* SEARCH */
.search-wrap{margin-bottom:20px}
.search-box{display:flex;gap:10px}
.search-input{flex:1;background:var(--bg1);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:13px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--faint)}
.search-btn{background:var(--gold);border:none;color:#000;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;white-space:nowrap}
.search-btn:hover{background:var(--accent2)}
.search-btn:disabled{opacity:.5;cursor:not-allowed}
/* DETAIL */
.det{background:var(--bg1);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-top:14px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.det-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.det-ticker{font-size:20px;font-weight:800;color:#f0f8ff;font-family:'IBM Plex Mono',monospace}
.det-name{font-size:11px;color:var(--faint);margin-top:2px}
.det-price{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:#f0f8ff}
.det-body{padding:18px;display:flex;flex-direction:column;gap:20px}
.sub{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
.hist{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
@media(max-width:550px){.hist{grid-template-columns:repeat(2,1fr)}}
.hcard{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px 11px}
.hper{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--faint);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.hpri{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);margin-bottom:3px}
.hpct{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700}
.dtbl{width:100%;border-collapse:collapse}
.dtbl th{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--faint);text-align:right;padding:6px 11px;border-bottom:1px solid var(--border);font-weight:500}
.dtbl th:first-child{text-align:left}
.dtbl td{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);text-align:right;padding:8px 11px;border-bottom:1px solid rgba(28,45,64,.35)}
.dtbl td:first-child{text-align:left;color:var(--faint)}
.dtbl tr:last-child td{border-bottom:none}
/* STATES */
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:36px;flex-direction:column;gap:10px}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint)}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ff8080;padding:13px 16px;border-radius:8px;font-size:12px;font-family:'IBM Plex Mono',monospace;margin-bottom:12px}
.hint{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint);text-align:center;padding:20px}
.close-btn{background:none;border:1px solid var(--border);color:var(--faint);border-radius:5px;padding:3px 9px;cursor:pointer;font-size:11px;font-family:'IBM Plex Mono',monospace}
.close-btn:hover{border-color:var(--red);color:var(--red)}
.fav-empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:50px 20px}
.fav-ei{font-size:38px;opacity:.15}
.fav-et{font-size:12px;color:var(--faint);text-align:center;font-family:'IBM Plex Mono',monospace}
.fav-count{background:rgba(240,165,0,.2);color:#ffcc44;border-radius:10px;font-size:10px;padding:1px 6px;font-family:'IBM Plex Mono',monospace;font-weight:600;margin-left:4px}
</style>
</head>
<body>
<div id="root"></div>
<script>
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useCallback = React.useCallback;
var useRef = React.useRef;

var BASE  = "https://brapi.dev/api";
var TOKEN = "whTDtVbb5qbqH9PuhriuiD";
function q(url){ return url + (url.indexOf("?")>=0?"&":"?") + "token=" + TOKEN; }

var CRYPTO = "BTC,ETH,BNB,SOL,XRP,ADA,DOGE,AVAX";
var COMMS  = "GC=F,CL=F,SI=F,NG=F,ZC=F,ZW=F";
var CNAMES = {"GC=F":"Ouro","CL=F":"Petróleo WTI","SI=F":"Prata","NG=F":"Gás Natural","ZC=F":"Milho","ZW=F":"Trigo"};
var TABS = [
  {id:"overview",label:"Visão Geral",icon:"⬡"},
  {id:"search",label:"Busca",icon:"⌕"},
  {id:"stocks",label:"Ações",icon:"◈"},
  {id:"fiis",label:"FIIs",icon:"◉"},
  {id:"crypto",label:"Criptos",icon:"◆"},
  {id:"commodities",label:"Commodities",icon:"◇"},
  {id:"favorites",label:"Favoritos",icon:"★"}
];

function brl(v,d){ d=d||2; if(v==null||isNaN(v))return"—"; return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:d}); }
function pct(v){ if(v==null||isNaN(v))return"—"; return (v>=0?"+":"")+Number(v).toFixed(2)+"%"; }
function pctChg(f,t){ return (f&&t&&f!==0)?(t-f)/f*100:null; }
function fmtD(ts){ return new Date(ts*1000).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}); }
function fmtDF(ts){ return new Date(ts*1000).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"}); }
function priceAt(hist,days){
  if(!hist||!hist.length)return null;
  var t=Date.now()/1000-days*86400;
  return hist.reduce(function(b,e){ return Math.abs(e.date-t)<Math.abs(b.date-t)?e:b; },hist[0]).close||null;
}

function Spin(){ return h('div',{className:'spin-wrap'},h('div',{className:'spin'}),h('span',{className:'spin-lbl'},'carregando...')); }

// ── DETAIL PANEL ────────────────────────────────────────────────
function Detail(props){
  var ticker=props.ticker, onClose=props.onClose;
  var s=useState(null); var data=s[0]; var setData=s[1];
  var l=useState(true); var loading=l[0]; var setLoading=l[1];
  var e=useState(null); var err=e[0]; var setErr=e[1];
  var ref=useRef(null);

  useEffect(function(){
    if(!ticker)return;
    setLoading(true); setData(null); setErr(null);
    fetch(q(BASE+"/quote/"+encodeURIComponent(ticker)+"?range=1y&interval=1d"))
      .then(function(r){return r.json();})
      .then(function(d){
        var result = d.results&&d.results[0]?d.results[0]:null;
        if(!result||!result.regularMarketPrice){setErr("Ativo não encontrado: "+ticker);}
        else{setData(result);}
      })
      .catch(function(){setErr("Erro ao buscar "+ticker);})
      .finally(function(){setLoading(false);});
  },[ticker]);

  useEffect(function(){
    setTimeout(function(){if(ref.current)ref.current.scrollIntoView({behavior:'smooth',block:'start'});},80);
  },[ticker]);

  if(loading) return h('div',{className:'det',ref:ref},h(Spin));
  if(err)     return h('div',{className:'det',ref:ref},
    h('div',{style:{padding:18,display:'flex',alignItems:'center',justifyContent:'space-between'}},
      h('div',{className:'err',style:{margin:0,flex:1}},err),
      onClose&&h('button',{className:'close-btn',style:{marginLeft:12},onClick:onClose},'✕ fechar')
    )
  );
  if(!data)   return null;

  var hist  = data.historicalDataPrice||[];
  var cur   = data.regularMarketPrice;
  var last5 = hist.slice(-5);
  var chgPct = data.regularMarketChangePercent||0;
  var isPos  = chgPct>=0;
  var periods = [{l:'15d',d:15},{l:'30d',d:30},{l:'3m',d:90},{l:'6m',d:180},{l:'1a',d:365}];

  return h('div',{className:'det',ref:ref},
    h('div',{className:'det-head'},
      h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:10}},
          h('div',{className:'det-ticker'},data.symbol),
          onClose&&h('button',{className:'close-btn',onClick:onClose},'✕ fechar')
        ),
        h('div',{className:'det-name'},data.shortName||data.longName||'')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h('div',{className:'det-price'},brl(cur)),
        h('div',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,fontWeight:600,padding:'4px 9px',borderRadius:5,
          background:isPos?'rgba(34,197,94,.1)':'rgba(239,68,68,.1)',
          color:isPos?'var(--green)':'var(--red)',
          border:'1px solid '+(isPos?'rgba(34,197,94,.25)':'rgba(239,68,68,.25)')}},
          (isPos?'▲':'▼')+' '+Math.abs(chgPct).toFixed(2)+'%'
        )
      )
    ),
    h('div',{className:'det-body'},
      last5.length>0&&h('div',null,
        h('div',{className:'sub'},'Fechamento — últimos 5 dias'),
        h('table',{className:'dtbl'},
          h('thead',null,h('tr',null,
            h('th',null,'Data'),h('th',null,'Abertura'),h('th',null,'Mín'),
            h('th',null,'Máx'),h('th',null,'Fechamento'),h('th',null,'Var.')
          )),
          h('tbody',null,last5.map(function(d,i){
            var prev=last5[i-1]; var v=prev?pctChg(prev.close,d.close):null;
            return h('tr',{key:d.date},
              h('td',null,fmtD(d.date)),h('td',null,brl(d.open)),
              h('td',{style:{color:'var(--red)'}},brl(d.low)),
              h('td',{style:{color:'var(--green)'}},brl(d.high)),
              h('td',{style:{color:'#e8f4ff',fontWeight:600}},brl(d.close)),
              h('td',{style:{color:v==null?'var(--faint)':v>=0?'var(--green)':'var(--red)',fontWeight:600}},v==null?'—':pct(v))
            );
          }))
        )
      ),
      h('div',null,
        h('div',{className:'sub'},'Preço histórico vs. hoje'),
        h('div',{className:'hist'},periods.map(function(p){
          var past=priceAt(hist,p.d); var ch=pctChg(past,cur);
          return h('div',{className:'hcard',key:p.l},
            h('div',{className:'hper'},p.l+' atrás'),
            h('div',{className:'hpri'},brl(past)),
            h('div',{className:'hpct',style:{color:ch==null?'var(--faint)':ch>=0?'var(--green)':'var(--red)'}},ch==null?'—':pct(ch))
          );
        }))
      )
    )
  );
}

// ── MARKET TABLE ────────────────────────────────────────────────
function MktTable(props){
  var title=props.title,badge=props.badge,data=props.data,loading=props.loading,error=props.error;
  var favSet=props.favSet,onFav=props.onFav,cat=props.cat,cols=props.cols,selTicker=props.selTicker,onSel=props.onSel;
  if(loading) return h('div',{className:'tbl-wrap'},h(Spin));
  if(error)   return h('div',{className:'err'},error);
  return h('div',{className:'tbl-wrap'},
    h('div',{className:'tbl-head'},title,h('span',{className:'bdg '+badge},(data&&data.length||0)+' ativos')),
    !data||!data.length ? h('div',{className:'hint'},'Nenhum dado disponível') :
    h('table',null,
      h('thead',null,h('tr',null,
        h('th',{style:{textAlign:'left'}},'Ativo'),
        cols.map(function(c){return h('th',{key:c.key},c.label);}),
        h('th',null,'Var. Hoje'),
        h('th',{style:{width:36}},null)
      )),
      h('tbody',null,data.map(function(row){
        var key=row.stock||row.coin||row.ticker;
        var isActive=selTicker===key;
        var isFav=favSet&&favSet.has(cat+':'+key);
        var chg=row.change!=null?row.change:row.regularMarketChangePercent;
        var isPos=(chg||0)>=0;
        return h('tr',{key:key,className:isActive?'sel':'',onClick:function(){onSel(key);}},
          h('td',null,h('div',null,h('div',{className:'tn'},key),h('div',{className:'ts'},row.name||row.longName||row.shortName||''))),
          cols.map(function(c){return h('td',{key:c.key,style:c.style||{}},c.render?c.render(row):row[c.key]||'—');}),
          h('td',{className:'chg '+(isPos?'pos':'neg')},(isPos?'▲':'▼')+' '+Math.abs(chg||0).toFixed(2)+'%'),
          h('td',{onClick:function(e){e.stopPropagation();onFav(cat+':'+key,row);}},
            h('button',{className:'fav-btn '+(isFav?'on':'')},'★')
          )
        );
      }))
    )
  );
}

// ── APP ────────────────────────────────────────────────────────
function App(){
  var t1=useState('overview'); var tab=t1[0]; var setTab=t1[1];
  var t2=useState({data:null,loading:true,error:null}); var stocks=t2[0]; var setStocks=t2[1];
  var t3=useState({data:null,loading:true,error:null}); var fiis=t3[0]; var setFiis=t3[1];
  var t4=useState({data:null,loading:true,error:null}); var crypto=t4[0]; var setCrypto=t4[1];
  var t5=useState({data:null,loading:true,error:null}); var comms=t5[0]; var setComms=t5[1];
  var t6=useState(function(){
    try{var s=localStorage.getItem('mhub:fav');return s?new Map(Object.entries(JSON.parse(s))):new Map();}
    catch(e){return new Map();}
  }); var favorites=t6[0]; var setFavorites=t6[1];
  var t7=useState(null); var selTicker=t7[0]; var setSelTicker=t7[1];
  var t8=useState(null); var selCat=t8[0]; var setSelCat=t8[1];
  var t9=useState(null); var lastUpdate=t9[0]; var setLastUpdate=t9[1];
  var t10=useState(false); var spinning=t10[0]; var setSpinning=t10[1];
  var t11=useState(''); var searchInput=t11[0]; var setSearchInput=t11[1];
  var t12=useState(null); var searchTicker=t12[0]; var setSearchTicker=t12[1];
  var t13=useState(false); var searchLoading=t13[0]; var setSearchLoading=t13[1];

  useEffect(function(){
    try{localStorage.setItem('mhub:fav',JSON.stringify(Object.fromEntries(favorites)));}catch(e){}
  },[favorites]);

  function fetchStocks(){
    return Promise.all([
      fetch(q(BASE+'/quote/list?sortBy=change&sortOrder=desc&limit=8&type=stock')).then(function(r){return r.json();}),
      fetch(q(BASE+'/quote/list?sortBy=change&sortOrder=asc&limit=8&type=stock')).then(function(r){return r.json();})
    ]).then(function(res){
      var g=res[0],l=res[1];
      function merge(arr){ return (arr||[]).filter(function(s){return s.close>0&&Math.abs(s.change||0)<50;}); }
      var combined=merge(g.stocks).concat(merge(l.stocks));
      var map=new Map(); combined.forEach(function(s){map.set(s.stock,s);});
      var uniq=Array.from(map.values()).sort(function(a,b){return (b.change||0)-(a.change||0);});
      setStocks({data:uniq,loading:false,error:null});
    }).catch(function(e){setStocks({data:null,loading:false,error:'Erro ações: '+e.message});});
  }

  function fetchFiis(){
    return Promise.all([
      fetch(q(BASE+'/quote/list?sortBy=change&sortOrder=desc&limit=8&type=fii')).then(function(r){return r.json();}),
      fetch(q(BASE+'/quote/list?sortBy=change&sortOrder=asc&limit=8&type=fii')).then(function(r){return r.json();})
    ]).then(function(res){
      var g=res[0],l=res[1];
      function merge(arr){ return (arr||[]).filter(function(s){return s.close>0;}); }
      var combined=merge(g.stocks).concat(merge(l.stocks));
      var map=new Map(); combined.forEach(function(s){map.set(s.stock,s);});
      var uniq=Array.from(map.values()).sort(function(a,b){return (b.change||0)-(a.change||0);});
      setFiis({data:uniq,loading:false,error:null});
    }).catch(function(e){setFiis({data:null,loading:false,error:'Erro FIIs: '+e.message});});
  }

  function fetchCrypto(){
    return fetch(q(BASE+'/v2/crypto?coin='+CRYPTO+'&currency=BRL'))
      .then(function(r){return r.json();})
      .then(function(d){
        var coins=(d.coins||[]).map(function(c){
          return {coin:c.coin,name:c.coinName,close:c.regularMarketPrice,change:c.regularMarketChangePercent,marketCap:c.marketCap};
        });
        setCrypto({data:coins,loading:false,error:null});
      }).catch(function(e){setCrypto({data:null,loading:false,error:'Erro cripto: '+e.message});});
  }

  function fetchComms(){
    return fetch(q(BASE+'/quote/'+COMMS+'?currency=BRL'))
      .then(function(r){return r.json();})
      .then(function(d){
        var items=(d.results||[]).filter(function(x){return x.regularMarketPrice>0;}).map(function(x){
          return {stock:x.symbol,name:CNAMES[x.symbol]||x.shortName||x.symbol,close:x.regularMarketPrice,change:x.regularMarketChangePercent,low52:x.fiftyTwoWeekLow,high52:x.fiftyTwoWeekHigh};
        });
        setComms({data:items,loading:false,error:null});
      }).catch(function(e){setComms({data:null,loading:false,error:'Erro commodities: '+e.message});});
  }

  function loadAll(){
    setSpinning(true);
    setStocks(function(s){return Object.assign({},s,{loading:true});});
    setFiis(function(s){return Object.assign({},s,{loading:true});});
    setCrypto(function(s){return Object.assign({},s,{loading:true});});
    setComms(function(s){return Object.assign({},s,{loading:true});});
    Promise.all([fetchStocks(),fetchFiis(),fetchCrypto(),fetchComms()]).then(function(){
      setLastUpdate(new Date()); setSpinning(false);
    });
  }

  useEffect(function(){loadAll();},[]);

  function toggleFav(key,row){
    setFavorites(function(prev){
      var n=new Map(prev);
      if(n.has(key)){n.delete(key);}else{n.set(key,row);}
      return n;
    });
  }

  var favSet=new Set(favorites.keys());

  function selTick(ticker,cat){
    if(selTicker===ticker){setSelTicker(null);setSelCat(null);}
    else{setSelTicker(ticker);setSelCat(cat);}
  }

  function doSearch(){
    var t=searchInput.trim().toUpperCase();
    if(!t)return;
    setSearchTicker(t);
  }

  function handleSearchKey(e){
    if(e.key==='Enter')doSearch();
  }

  // gainers/losers para overview
  var gainers=((stocks.data||[]).filter(function(s){return s.change>0;}).slice(0,5));
  var losers=((stocks.data||[]).filter(function(s){return s.change<0;}).slice(-5).reverse());

  var topStock  = stocks.data&&stocks.data.find(function(s){return s.change>0;});
  var topFii    = fiis.data&&fiis.data.find(function(s){return s.change>0;});
  var topCrypto = crypto.data&&crypto.data[0];
  var topComm   = comms.data&&comms.data[0];

  function SummaryCard(p){
    return h('div',{className:'card'},
      h('div',{className:'card-lbl'},p.label),
      h('div',{className:'card-val'},p.val||'—'),
      h('div',{className:'card-chg '+(p.badge||'')},p.change||'—')
    );
  }

  function MoverRow(p){
    var item=p.item, isGain=p.isGain;
    var key=item.stock||item.coin;
    var isFav=favSet.has('stocks:'+key)||favSet.has('fiis:'+key)||favSet.has('crypto:'+key);
    var chg=item.change||0;
    var cat=item.cat||'stocks';
    return h('div',{className:'mrow',onClick:function(){selTick(key,cat);}},
      h('div',{className:'mrow-left'},
        h('div',null,
          h('div',{className:'tn'},key),
          h('div',{className:'ts'},item.name||item.longName||item.shortName||'')
        )
      ),
      h('div',{className:'mrow-right'},
        h('div',{className:'mprice'},brl(item.close)),
        h('div',{className:'mchg '+(isGain?'pos':'neg')},(isGain?'▲':'▼')+' '+Math.abs(chg).toFixed(2)+'%'),
        h('button',{className:'fav-btn '+(isFav?'on':''),onClick:function(e){e.stopPropagation();toggleFav(cat+':'+key,item);}},'★')
      )
    );
  }

  var stockCols=[
    {key:'close',label:'Preço',render:function(r){return h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close));}},
    {key:'volume',label:'Volume',render:function(r){return r.volume?(r.volume/1e6).toFixed(1)+'M':'—';}},
  ];
  var fiiCols=[
    {key:'close',label:'Cota',render:function(r){return h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close));}},
    {key:'dividendYield',label:'DY',render:function(r){return r.dividendYield?r.dividendYield.toFixed(2)+'%':'—';}},
  ];
  var cryptoCols=[
    {key:'close',label:'Preço (BRL)',render:function(r){return h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close));}},
    {key:'marketCap',label:'Mkt Cap',render:function(r){return r.marketCap?'$'+(r.marketCap/1e9).toFixed(1)+'B':'—';}},
  ];
  var commCols=[
    {key:'close',label:'Preço',render:function(r){return h('span',{style:{color:'#e8f4ff',fontWeight:600}},brl(r.close));}},
    {key:'low52',label:'Mín 52s',render:function(r){return brl(r.low52);}},
    {key:'high52',label:'Máx 52s',render:function(r){return brl(r.high52);}},
  ];

  function renderTab(){
    // ── VISÃO GERAL
    if(tab==='overview') return h('div',null,
      h('div',{className:'lbl'},'Resumo dos mercados'),
      h('div',{className:'cards'},
        h(SummaryCard,{label:'Maior Alta — Ações',val:topStock?brl(topStock.close):'—',change:topStock?'▲ '+topStock.change.toFixed(2)+'% · '+topStock.stock:'—',badge:'pos'}),
        h(SummaryCard,{label:'Maior Alta — FIIs',val:topFii?brl(topFii.close):'—',change:topFii?'▲ '+topFii.change.toFixed(2)+'% · '+topFii.stock:'—',badge:'pos'}),
        h(SummaryCard,{label:'Top Cripto',val:topCrypto?brl(topCrypto.close):'—',change:topCrypto?(topCrypto.change>=0?'▲':'▼')+' '+Math.abs(topCrypto.change||0).toFixed(2)+'% · '+topCrypto.coin:'—',badge:topCrypto&&topCrypto.change>=0?'pos':'neg'}),
        h(SummaryCard,{label:'Top Commodity',val:topComm?brl(topComm.close):'—',change:topComm?(topComm.change>=0?'▲':'▼')+' '+Math.abs(topComm.change||0).toFixed(2)+'% · '+topComm.name:'—',badge:topComm&&topComm.change>=0?'pos':'neg'})
      ),
      h('div',{className:'lbl'},'Maiores movimentações do dia'),
      h('div',{className:'movers'},
        h('div',{className:'mover-box'},
          h('div',{className:'mover-title'},h('div',{className:'dot dot-g'}),'Maiores Altas'),
          stocks.loading?h(Spin):gainers.length?gainers.map(function(item){return h(MoverRow,{key:item.stock,item:Object.assign({},item,{cat:'stocks'}),isGain:true});}):h('div',{className:'hint'},'Sem dados')
        ),
        h('div',{className:'mover-box'},
          h('div',{className:'mover-title'},h('div',{className:'dot dot-r'}),'Maiores Baixas'),
          stocks.loading?h(Spin):losers.length?losers.map(function(item){return h(MoverRow,{key:item.stock,item:Object.assign({},item,{cat:'stocks'}),isGain:false});}):h('div',{className:'hint'},'Sem dados')
        )
      ),
      selTicker&&selCat==='stocks'&&h(Detail,{key:selTicker,ticker:selTicker,onClose:function(){setSelTicker(null);}})
    );

    // ── BUSCA
    if(tab==='search') return h('div',null,
      h('div',{className:'lbl'},'Busca de ativos'),
      h('div',{className:'search-wrap'},
        h('div',{className:'search-box'},
          h('input',{
            className:'search-input',
            placeholder:'Digite o ticker — ex: PETR4, VALE3, BTC, GC=F...',
            value:searchInput,
            onChange:function(e){setSearchInput(e.target.value.toUpperCase());},
            onKeyDown:handleSearchKey
          }),
          h('button',{className:'search-btn',onClick:doSearch},'Buscar')
        )
      ),
      searchTicker&&h(Detail,{key:searchTicker,ticker:searchTicker,onClose:function(){setSearchTicker(null);setSearchInput('');}})
    );

    // ── AÇÕES
    if(tab==='stocks') return h('div',null,
      h('div',{className:'lbl'},'Ações — B3'),
      h(MktTable,{title:'Mercado de Ações',badge:'bdg-blue',data:stocks.data,loading:stocks.loading,error:stocks.error,favSet:favSet,onFav:toggleFav,cat:'stocks',cols:stockCols,selTicker:selTicker,onSel:function(t){selTick(t,'stocks');}}),
      selTicker&&selCat==='stocks'&&h(Detail,{key:selTicker,ticker:selTicker,onClose:function(){setSelTicker(null);}})
    );

    // ── FIIS
    if(tab==='fiis') return h('div',null,
      h('div',{className:'lbl'},'Fundos Imobiliários — B3'),
      h(MktTable,{title:'FIIs',badge:'bdg-teal',data:fiis.data,loading:fiis.loading,error:fiis.error,favSet:favSet,onFav:toggleFav,cat:'fiis',cols:fiiCols,selTicker:selTicker,onSel:function(t){selTick(t,'fiis');}}),
      selTicker&&selCat==='fiis'&&h(Detail,{key:selTicker,ticker:selTicker,onClose:function(){setSelTicker(null);}})
    );

    // ── CRIPTOS
    if(tab==='crypto') return h('div',null,
      h('div',{className:'lbl'},'Criptomoedas — preços em BRL'),
      h(MktTable,{title:'Criptomoedas',badge:'bdg-purple',data:crypto.data,loading:crypto.loading,error:crypto.error,favSet:favSet,onFav:toggleFav,cat:'crypto',cols:cryptoCols,selTicker:null,onSel:function(){}})
    );

    // ── COMMODITIES
    if(tab==='commodities') return h('div',null,
      h('div',{className:'lbl'},'Commodities — cotações em BRL'),
      h(MktTable,{title:'Commodities',badge:'bdg-gold',data:comms.data,loading:comms.loading,error:comms.error,favSet:favSet,onFav:toggleFav,cat:'commodities',cols:commCols,selTicker:selTicker,onSel:function(t){selTick(t,'commodities');}}),
      selTicker&&selCat==='commodities'&&h(Detail,{key:selTicker,ticker:selTicker,onClose:function(){setSelTicker(null);}})
    );

    // ── FAVORITOS
    if(tab==='favorites') return h('div',null,
      h('div',{className:'lbl'},'Favoritos — '+favorites.size+' ativos salvos'),
      favorites.size===0
        ? h('div',{className:'tbl-wrap'},h('div',{className:'fav-empty'},h('div',{className:'fav-ei'},'★'),h('div',{className:'fav-et'},'Você ainda não tem favoritos.',h('br'),'Clique em ★ em qualquer ativo para salvar aqui.')))
        : h('div',{className:'mover-box'},
            Array.from(favorites.entries()).map(function(entry){
              var k=entry[0],row=entry[1];
              var cat=k.split(':')[0];
              var catLabel={stocks:'AÇÃO',fiis:'FII',crypto:'CRIPTO',commodities:'COMM'}[cat]||'';
              var ticker=row.stock||row.coin||row.ticker;
              var chg=row.change||0;
              return h('div',{key:k,className:'mrow',onClick:function(){selTick(ticker,cat);}},
                h('div',{className:'mrow-left'},
                  h('div',null,
                    h('div',{className:'tn'},ticker),
                    h('div',{className:'ts'},catLabel+' · '+(row.name||row.longName||''))
                  )
                ),
                h('div',{className:'mrow-right'},
                  h('div',{className:'mprice'},brl(row.close)),
                  h('div',{className:'mchg '+(chg>=0?'pos':'neg')},(chg>=0?'▲':'▼')+' '+Math.abs(chg).toFixed(2)+'%'),
                  h('button',{className:'fav-btn on',onClick:function(e){e.stopPropagation();toggleFav(k,row);}},'★')
                )
              );
            }),
            selTicker&&h(Detail,{key:selTicker,ticker:selTicker,onClose:function(){setSelTicker(null);}})
          )
    );

    return null;
  }

  return h('div',null,
    h('div',{className:'hdr'},
      h('div',{className:'hdr-top'},
        h('div',{className:'logo'},
          h('div',{className:'logo-m'},'M'),
          h('div',null,
            h('div',{className:'logo-n'},'Mercado',h('span',null,'Hub')),
            h('div',{className:'meta'},lastUpdate?'atualizado '+lastUpdate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'aguardando dados...')
          )
        ),
        h('button',{className:'btn',onClick:loadAll},spinning?'⟳ Atualizando...':'↺ Atualizar')
      ),
      h('div',{className:'tabs'},TABS.map(function(t){
        var isOn=tab===t.id;
        var isFav=t.id==='favorites';
        var cnt=isFav&&favorites.size>0?h('span',{className:'fav-count'},favorites.size):null;
        return h('div',{
          key:t.id,
          className:'tab '+(isOn?'on':'')+' '+(isFav?'fav':''),
          onClick:function(){setTab(t.id);setSelTicker(null);}
        },h('span',{style:{marginRight:4,opacity:.7}},t.icon),t.label,cnt);
      }))
    ),
    h('div',{className:'page'},renderTab())
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
